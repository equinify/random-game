<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Database — Caster Chronicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080808; --surface:#111; --surface2:#181818;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.06);
      --white:#f0f0f0; --grey:#888; --grey-dim:#444;
      --red:#e53935; --green:#4caf50;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:'Crimson Pro',serif;}
    #topbar{position:sticky;top:0;z-index:50;background:rgba(8,8,8,0.95);border-bottom:1px solid var(--border2);backdrop-filter:blur(8px);display:flex;align-items:center;padding:0 24px;height:49px;gap:8px;}
    .back-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);text-decoration:none;border:1px solid var(--border);border-radius:2px;padding:5px 12px;transition:color .2s,border-color .2s;white-space:nowrap;}
    .back-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
    .topbar-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--white);position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;}
    #topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .topbar-divider{width:1px;height:16px;background:var(--border);}
    .topbar-btn{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.1em;padding:5px 12px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--grey);cursor:pointer;transition:color .2s,border-color .2s;}
    .topbar-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
    #topbar-username{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--white);white-space:nowrap;}
    .role-badge{font-size:.55rem;font-family:'Cinzel',serif;letter-spacing:.08em;padding:2px 7px;border-radius:2px;font-weight:700;text-transform:uppercase;border:1px solid;}
    .role-creator{color:#f5c518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08);}
    .role-card_editor{color:#90caf9;border-color:rgba(144,202,249,.3);background:rgba(144,202,249,.08);}
    #page{display:flex;min-height:calc(100vh - 49px);}
    #sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border2);padding:20px 18px;display:flex;flex-direction:column;gap:20px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
    .sidebar-section-title{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--grey-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
    #search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:8px 12px;color:var(--white);font-family:'Crimson Pro',serif;font-size:.9rem;outline:none;transition:border-color .2s;}
    #search-input:focus{border-color:rgba(255,255,255,.3);}
    .filter-group{display:flex;flex-direction:column;gap:6px;}
    .filter-label{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey);margin-bottom:2px;}
    .filter-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:7px 10px;color:var(--white);font-family:'Crimson Pro',serif;font-size:.88rem;outline:none;transition:border-color .2s;cursor:pointer;}
    .filter-select:focus{border-color:rgba(255,255,255,.3);}
    .filter-select option{background:#111;}
    .reset-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--grey);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:color .2s,border-color .2s;}
    .reset-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
    #main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow:hidden;}
    #card-count-bar{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey);display:flex;align-items:center;justify-content:space-between;}
    #sort-row{display:flex;align-items:center;gap:8px;}
    .sort-select{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:5px 10px;color:var(--white);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;outline:none;cursor:pointer;}
    .sort-select option{background:#111;}
    #card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;overflow-y:auto;max-height:calc(100vh - 140px);padding-bottom:20px;}
    .card-tile{background:var(--surface);border:1px solid var(--border2);border-radius:3px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;flex-direction:column;animation:tileIn .3s ease both;}
    @keyframes tileIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card-tile:hover{border-color:rgba(255,255,255,.25);transform:translateY(-2px);}
    .card-image{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--grey-dim);font-size:.7rem;font-family:'Cinzel',serif;letter-spacing:.1em;text-align:center;}
    .card-image img{width:100%;height:100%;object-fit:cover;}
    .card-body{padding:10px 10px 8px;flex:1;display:flex;flex-direction:column;gap:4px;}
    .card-name{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.06em;color:var(--white);line-height:1.3;}
    .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px;}
    .card-type-badge{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);border:1px solid var(--border2);padding:1px 5px;border-radius:1px;}
    .card-element{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border-radius:1px;border:1px solid;font-weight:700;}
    .el-solis{color:#f5c518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08);}
    .el-ignus{color:#ff5722;border-color:rgba(255,87,34,.3);background:rgba(255,87,34,.08);}
    .el-silva{color:#66bb6a;border-color:rgba(102,187,106,.3);background:rgba(102,187,106,.08);}
    .card-rarity{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;margin-top:auto;padding-top:6px;}
    .rar-common{color:#9e9e9e;}.rar-uncommon{color:#66bb6a;}.rar-rare{color:#42a5f5;}.rar-super-rare{color:#ab47bc;}
    #empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--grey-dim);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;}
  </style>
</head>
<body>

<div id="topbar">
  <a class="back-btn" href="index.html">← Back</a>
  <div class="topbar-title">Card Database</div>
  <div id="topbar-right">
    <button class="topbar-btn" id="refresh-btn" onclick="loadCards()">🔄 Refresh</button>
    <div class="topbar-divider" id="div-username" style="display:none;"></div>
    <span id="topbar-username" style="display:none;"></span>
    <span class="role-badge" id="topbar-badge" style="display:none;"></span>
    <div class="topbar-divider" id="div-action" style="display:none;"></div>
    <button class="topbar-btn" id="topbar-signout-btn" style="display:none;" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div id="page">
  <div id="sidebar">
    <div>
      <div class="sidebar-section-title">Search</div>
      <input id="search-input" type="text" placeholder="Search cards…" oninput="applyFilters()"/>
    </div>
    <div>
      <div class="sidebar-section-title">Filters</div>
      <div class="filter-group">
        <div class="filter-label">Element</div>
        <select class="filter-select" id="f-element" onchange="applyFilters()">
          <option value="">All Elements</option>
          <option value="solis">Solis</option><option value="ignus">Ignus</option>
          <option value="silva">Silva</option>
        </select>
        <div class="filter-label">Type</div>
        <select class="filter-select" id="f-type" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="caster">Caster</option><option value="barrier">Barrier</option>
        </select>
        <div class="filter-label">Rarity</div>
        <select class="filter-select" id="f-rarity" onchange="applyFilters()">
          <option value="">All Rarities</option>
          <option value="common">Common</option><option value="uncommon">Uncommon</option>
        </select>
      </div>
      <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
    </div>
  </div>

  <div id="main">
    <div id="card-count-bar">
      <span id="count-label">Loading…</span>
      <div id="sort-row">
        <span style="font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--grey-dim);">Sort</span>
        <select class="sort-select" id="sort-by" onchange="applyFilters()">
          <option value="name">Name</option><option value="rarity">Rarity</option>
        </select>
        <select class="sort-select" id="sort-dir" onchange="applyFilters()">
          <option value="asc">↑</option><option value="desc">↓</option>
        </select>
      </div>
    </div>
    <div id="card-grid"><div id="empty-state">Loading cards…</div></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://bcqgrxzhjawxqwceflpk.supabase.co';
const SUPABASE_ANON = 'sb_publishable_dhuEDL-DJP4_mD4PUVIevg_1u_gjA-j';
window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const sb = window.sb;

const ROLE_LABELS = {creator:'👑 Creator',admin:'🛡 Admin',card_editor:'✏️ Editor',moderator:'🔰 Mod',supporter:'💎 Supporter',player:'Player'};
const RARITY_ORDER = ['common','uncommon','rare','super rare','ultra rare','secret rare','hyper rare','repack','promo'];

const CARD_DATA = [
  {
    "id": 1,
    "name": "Orange Peko Lv1",
    "element": "solis",
    "card type": "caster",
    "rarity": "common",
    "atk": 100,
    "def": 50,
    "aether cost": 2,
    "race_trait": "Fox Spirit",
    "artist": "Unknown",
    "description": "A fox spirit of modest power. Orange Peko is just beginning her magical journey.",
    "special ability": "When played, gain 1 aether.",
    "image url": "https://cdn.buylist.ca/Single_Card_Images/watermarked/casterchronicles/the-magic-battle-begins/Orange_Peko_Lv1__The_Magic_Battle_Begins_147241_3514528.webp",
    "card set": "modern",
    "has break": false,
    "break type": null,
    "added_by": "system",
    "created at": "2026-03-06",
    "effect data": null
  }
];

let allCards = [];
let currentUser = null;
let currentProfile = null;

function updateAuthUI(){
  const uname = document.getElementById('topbar-username');
  const badge = document.getElementById('topbar-badge');
  const signoutBtn = document.getElementById('topbar-signout-btn');
  const divUser = document.getElementById('div-username');
  const divAction = document.getElementById('div-action');
  
  if(currentProfile){
    uname.textContent = currentProfile.username || currentUser?.email || '';
    uname.style.display = '';
    const role = currentProfile.role;
    badge.textContent = ROLE_LABELS[role] || role;
    badge.className = `role-badge role-${role}`;
    badge.style.display = '';
    divUser.style.display = '';
    divAction.style.display = '';
    signoutBtn.style.display = '';
  } else if(currentUser){
    uname.textContent = currentUser.email;
    uname.style.display = '';
    divUser.style.display = '';
    divAction.style.display = '';
    signoutBtn.style.display = '';
  } else {
    uname.style.display = 'none';
    badge.style.display = 'none';
    divUser.style.display = 'none';
    divAction.style.display = 'none';
    signoutBtn.style.display = 'none';
  }
}

async function init(){
  try{
    const{data:{session}} = await sb.auth.getSession();
    if(session?.user){
      currentUser = session.user;
      const{data} = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      currentProfile = data;
    }
  }catch(e){console.error('[init]', e);}
  updateAuthUI();
  loadCards();
}

sb.auth.onAuthStateChange(async(event, session)=>{
  if(event === 'SIGNED_OUT'){
    currentUser = null;
    currentProfile = null;
  } else if(session?.user){
    currentUser = session.user;
    try{
      const{data} = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      currentProfile = data;
    }catch(e){console.error('[auth]', e);}
  }
  updateAuthUI();
});

async function signOut(){
  await sb.auth.signOut();
  currentUser = null;
  currentProfile = null;
  updateAuthUI();
}

function loadCards(){
  allCards = CARD_DATA;
  applyFilters();
}

function applyFilters(){
  const search = document.getElementById('search-input').value.toLowerCase();
  const element = document.getElementById('f-element').value;
  const type = document.getElementById('f-type').value;
  const rarity = document.getElementById('f-rarity').value;
  const sortBy = document.getElementById('sort-by').value;
  const sortDir = document.getElementById('sort-dir').value;

  let filtered = allCards.filter(c=>{
    if(search && !c.name.toLowerCase().includes(search)) return false;
    if(element && c.element !== element) return false;
    if(type && c['card type'] !== type) return false;
    if(rarity && c.rarity !== rarity) return false;
    return true;
  });

  filtered.sort((a,b)=>{
    let va = a[sortBy], vb = b[sortBy];
    if(sortBy === 'rarity'){va = RARITY_ORDER.indexOf(va); vb = RARITY_ORDER.indexOf(vb);}
    if(typeof va === 'string') va = va.toLowerCase();
    if(typeof vb === 'string') vb = vb.toLowerCase();
    if(va < vb) return sortDir === 'asc' ? -1 : 1;
    if(va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  renderGrid(filtered);
}

function resetFilters(){
  document.getElementById('search-input').value = '';
  document.getElementById('f-element').value = '';
  document.getElementById('f-type').value = '';
  document.getElementById('f-rarity').value = '';
  applyFilters();
}

function rarityClass(r){return 'rar-'+r.replace(/ /g,'-');}

function renderGrid(cards){
  const grid = document.getElementById('card-grid');
  const label = document.getElementById('count-label');
  label.textContent = `${cards.length} card${cards.length!==1?'s':''}`;
  
  if(cards.length === 0){
    grid.innerHTML = '<div id="empty-state">No cards found.</div>';
    return;
  }
  
  grid.innerHTML = cards.map((c,i) => `
    <div class="card-tile" style="animation-delay:${i*0.03}s">
      <div class="card-image">
        <img src="${c['image url']}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;" />
      </div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">
          <span class="card-type-badge">${c['card type']}</span>
          <span class="card-element el-${c.element}">${c.element}</span>
        </div>
        <div style="font-family:'Cinzel',serif;font-size:.5rem;color:var(--grey);margin-top:4px;">ATK ${c.atk} | DEF ${c.def} | ✦ ${c['aether cost']}</div>
        <div class="card-rarity ${rarityClass(c.rarity)}">${c.rarity}</div>
      </div>
    </div>
  `).join('');
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
