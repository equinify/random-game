<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Database — Caster Chronicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080808; --surface:#111; --surface2:#181818;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.06);
      --white:#f0f0f0; --grey:#888; --grey-dim:#444;
      --red:#e53935; --green:#4caf50;
      --solis:#f5c518; --ignus:#ff5722; --silva:#66bb6a; --terra:#a1887f;
      --luna:#ce93d8; --aqua:#4fc3f7; --aes:#90a4ae; --void:#616161;
      --common:#9e9e9e; --uncommon:#66bb6a; --rare:#42a5f5;
      --super-rare:#ab47bc; --ultra-rare:#ffa726; --secret-rare:#ef5350;
      --hyper-rare:#f5c518; --repack:#78909c; --promo:#26c6da;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:'Crimson Pro',serif;}
    #topbar{position:sticky;top:0;z-index:50;background:rgba(8,8,8,0.95);border-bottom:1px solid var(--border2);backdrop-filter:blur(8px);display:flex;align-items:center;padding:0 24px;height:49px;gap:8px;}
    .back-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);text-decoration:none;border:1px solid var(--border);border-radius:2px;padding:5px 12px;transition:color .2s,border-color .2s;white-space:nowrap;}
    .back-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
    .topbar-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--white);position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;}
    #topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    #main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow:hidden;}
    #card-count-bar{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey);display:flex;align-items:center;justify-content:space-between;}
    #sort-row{display:flex;align-items:center;gap:8px;}
    .sort-select{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:5px 10px;color:var(--white);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;outline:none;cursor:pointer;}
    .sort-select option{background:#111;}
    #card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;overflow-y:auto;max-height:calc(100vh - 140px);padding-bottom:20px;}
    #card-grid::-webkit-scrollbar{width:4px;}
    #card-grid::-webkit-scrollbar-thumb{background:var(--grey-dim);border-radius:2px;}
    .card-tile{background:var(--surface);border:1px solid var(--border2);border-radius:3px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;flex-direction:column;animation:tileIn .3s ease both;}
    @keyframes tileIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card-tile:hover{border-color:rgba(255,255,255,.25);transform:translateY(-2px);}
    .card-image{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--grey-dim);font-size:.7rem;font-family:'Cinzel',serif;letter-spacing:.1em;text-align:center;}
    .card-image img{width:100%;height:100%;object-fit:cover;}
    .card-image.no-img{padding:20px;}
    .card-body{padding:10px 10px 8px;flex:1;display:flex;flex-direction:column;gap:4px;}
    .card-name{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.06em;color:var(--white);line-height:1.3;}
    .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px;}
    .card-type-badge{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);border:1px solid var(--border2);padding:1px 5px;border-radius:1px;}
    .card-element{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border-radius:1px;border:1px solid;font-weight:700;}
    .el-solis{color:var(--solis);border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08);}
    .el-ignus{color:var(--ignus);border-color:rgba(255,87,34,.3);background:rgba(255,87,34,.08);}
    .el-silva{color:var(--silva);border-color:rgba(102,187,106,.3);background:rgba(102,187,106,.08);}
    .el-terra{color:var(--terra);border-color:rgba(161,136,127,.3);background:rgba(161,136,127,.08);}
    .el-luna{color:var(--luna);border-color:rgba(206,147,216,.3);background:rgba(206,147,216,.08);}
    .el-aqua{color:var(--aqua);border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.08);}
    .el-aes{color:var(--aes);border-color:rgba(144,164,174,.3);background:rgba(144,164,174,.08);}
    .el-void{color:var(--void);border-color:rgba(97,97,97,.3);background:rgba(97,97,97,.08);}
    .card-rarity{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;margin-top:auto;padding-top:6px;}
    .rar-common{color:var(--common);}.rar-uncommon{color:var(--uncommon);}.rar-rare{color:var(--rare);}.rar-super-rare{color:var(--super-rare);}
    .rar-ultra-rare{color:var(--ultra-rare);}.rar-secret-rare{color:var(--secret-rare);}.rar-hyper-rare{color:var(--hyper-rare);}.rar-repack{color:var(--repack);}.rar-promo{color:var(--promo);}
    .card-stats{display:flex;gap:8px;font-family:'Cinzel',serif;font-size:.52rem;color:var(--grey);margin-top:4px;}
    #empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--grey-dim);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;}
    #detail-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
    #detail-overlay.open{opacity:1;pointer-events:all;}
    #detail-box{background:var(--surface);border:1px solid var(--border);border-radius:3px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(16px) scale(.97);transition:transform .25s ease;display:flex;}
    #detail-overlay.open #detail-box{transform:translateY(0) scale(1);}
    #detail-img{width:200px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--grey-dim);font-size:.65rem;font-family:'Cinzel',serif;text-align:center;padding:10px;}
    #detail-img img{width:100%;height:100%;object-fit:cover;}
    #detail-content{flex:1;padding:24px 22px;display:flex;flex-direction:column;gap:12px;}
    #detail-close{position:absolute;top:12px;right:14px;background:none;border:none;cursor:pointer;color:var(--grey-dim);font-size:1rem;transition:color .2s;}
    #detail-close:hover{color:var(--white);}
    .detail-name{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--white);line-height:1.2;}
    .detail-badges{display:flex;gap:6px;flex-wrap:wrap;}
    .detail-section-label{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--grey-dim);margin-bottom:3px;}
    .detail-text{font-size:.88rem;color:var(--white);line-height:1.5;}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
    .detail-field{display:flex;flex-direction:column;gap:2px;}
    .detail-value{font-family:'Cinzel',serif;font-size:.68rem;color:var(--white);}
  </style>
</head>
<body>

<div id="topbar">
  <a class="back-btn" href="index.html">← Back</a>
  <div class="topbar-title">Card Database</div>
  <div id="topbar-right"></div>
</div>

<div id="main">
  <div id="card-count-bar">
    <span id="count-label">Loading…</span>
    <div id="sort-row">
      <span style="font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--grey-dim);">Sort</span>
      <select class="sort-select" id="sort-by" onchange="applyFilters()">
        <option value="name">Name</option><option value="rarity">Rarity</option>
        <option value="element">Element</option><option value="aether cost">Aether Cost</option>
        <option value="atk">ATK</option><option value="def">DEF</option>
      </select>
      <select class="sort-select" id="sort-dir" onchange="applyFilters()">
        <option value="asc">↑</option><option value="desc">↓</option>
      </select>
    </div>
  </div>
  <div id="card-grid"><div id="empty-state">Loading cards…</div></div>
</div>

<div id="detail-overlay" onclick="closeDetail(event)">
  <div id="detail-box">
    <div id="detail-img">No Image</div>
    <div id="detail-content">
      <button id="detail-close" onclick="closeDetailBtn()">✕</button>
      <div class="detail-name" id="d-name"></div>
      <div class="detail-badges" id="d-badges"></div>
      <div id="d-desc-section"><div class="detail-section-label">Description</div><div class="detail-text" id="d-desc"></div></div>
      <div id="d-ability-section"><div class="detail-section-label">Special Ability</div><div class="detail-text" id="d-ability"></div></div>
      <div class="detail-grid" id="d-grid"></div>
    </div>
  </div>
</div>

<script>
const RARITY_ORDER = ['common','uncommon','rare','super rare','ultra rare','secret rare','hyper rare','repack','promo'];

let allCards=[],currentCard=null;

async function loadCards(){
  try {
    console.log('[loadCards] Loading from GitHub...');
    const response = await fetch('https://raw.githubusercontent.com/equinify/random-game/master/cardimage.json');
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    const data = await response.json();
    console.log('[loadCards] Loaded', data.length, 'cards');
    allCards = data || [];
    applyFilters();
  } catch(e) {
    console.error('[loadCards] Error:', e.message);
    document.getElementById('empty-state').textContent='Error loading cards: '+e.message;
  }
}

function applyFilters(){
  const sortBy = document.getElementById('sort-by').value;
  const sortDir = document.getElementById('sort-dir').value;

  let filtered = [...allCards];

  filtered.sort((a,b)=>{
    let va=a[sortBy],vb=b[sortBy];
    if(sortBy==='rarity'){va=RARITY_ORDER.indexOf(va);vb=RARITY_ORDER.indexOf(vb);}
    if(va===null||va===undefined)va=sortDir==='asc'?Infinity:-Infinity;
    if(vb===null||vb===undefined)vb=sortDir==='asc'?Infinity:-Infinity;
    if(typeof va==='string')va=va.toLowerCase();
    if(typeof vb==='string')vb=vb.toLowerCase();
    if(va<vb)return sortDir==='asc'?-1:1;
    if(va>vb)return sortDir==='asc'?1:-1;
    return 0;
  });
  renderGrid(filtered);
}

function rarityClass(r){return 'rar-'+r.replace(/ /g,'-');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderGrid(cards){
  const grid=document.getElementById('card-grid');
  const label=document.getElementById('count-label');
  label.textContent=`${cards.length} card${cards.length!==1?'s':''} found`;
  if(cards.length===0){grid.innerHTML=`<div id="empty-state">No cards found.</div>`;return;}
  grid.innerHTML=cards.map((c,i)=>`
    <div class="card-tile" onclick="openDetail(${i})" style="animation-delay:${i*0.03}s">
      <div class="card-image ${c['image url']?'':'no-img'}">
        ${c['image url']?`<img src="${escHtml(c['image url'])}" alt="${escHtml(c.name)}" onerror="this.parentElement.className='card-image no-img';this.parentElement.innerHTML='No Image';"/>`:'No Image'}
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(c.name)}</div>
        <div class="card-meta">
          <span class="card-type-badge">${escHtml(c['card type'])}</span>
          <span class="card-element el-${c.element}">${c.element}</span>
        </div>
        ${(c.atk!==null||c.def!==null)?`<div class="card-stats">${c.atk!==null?`ATK <span>${c.atk}</span>`:''} ${c.def!==null?`DEF <span>${c.def}</span>`:''} ${c['aether cost']!==undefined?`✦ <span>${c['aether cost']}</span>`:''}</div>`:''}
        <div class="card-rarity ${rarityClass(c.rarity)}">${c.rarity}</div>
      </div>
    </div>`).join('');
}

function openDetail(idx){
  const c=allCards[idx];if(!c)return;
  currentCard=c;
  const imgEl=document.getElementById('detail-img');
  imgEl.innerHTML=c['image url']?`<img src="${escHtml(c['image url'])}" alt="${escHtml(c.name)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.textContent='No Image'"/>`:'No Image';
  document.getElementById('d-name').textContent=c.name;
  document.getElementById('d-badges').innerHTML=`
    <span class="card-element el-${c.element}">${c.element}</span>
    <span class="card-type-badge">${escHtml(c['card type'])}</span>
    <span class="card-rarity ${rarityClass(c.rarity)}">${c.rarity}</span>
    ${c['aether cost']!==null?`<span class="card-type-badge">✦ ${c['aether cost']} Aether</span>`:''}`;
  const descS=document.getElementById('d-desc-section');
  document.getElementById('d-desc').textContent=c.description||'';
  descS.style.display=c.description?'':'none';
  const abilS=document.getElementById('d-ability-section');
  document.getElementById('d-ability').textContent=c['special ability']||'';
  abilS.style.display=c['special ability']?'':'none';
  document.getElementById('d-grid').innerHTML=[
    ['ATK',c.atk!==null?c.atk:'—'],['DEF',c.def!==null?c.def:'—'],
    ['Race / Trait',c.race_trait||'—'],['Artist',c.artist||'—'],
  ].map(([l,v])=>`<div class="detail-field"><div class="detail-section-label">${l}</div><div class="detail-value">${escHtml(String(v))}</div></div>`).join('');
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e){if(e.target===document.getElementById('detail-overlay'))closeDetailBtn();}
function closeDetailBtn(){document.getElementById('detail-overlay').classList.remove('open');currentCard=null;}

loadCards();
</script>
</body>
</html>
