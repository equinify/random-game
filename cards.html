<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Database — Caster Chronicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080808;--surface:#111;--white:#f0f0f0;--grey:#888;--border:rgba(255,255,255,0.1);--green:#4caf50;--red:#e53935}
    html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Crimson Pro',serif}
    
    #topbar{position:sticky;top:0;z-index:50;background:rgba(8,8,8,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);display:flex;align-items:center;padding:0 20px;height:50px;gap:15px}
    .back-btn{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;color:var(--grey);text-decoration:none;border:1px solid var(--border);border-radius:2px;padding:5px 12px;cursor:pointer}
    .back-btn:hover{color:var(--white)}
    .topbar-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--white);flex:1;text-align:center}
    #topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
    .topbar-btn{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--grey);cursor:pointer;border-radius:2px;transition:all .2s}
    .topbar-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3)}
    #refresh-btn,#add-btn{color:var(--grey)}
    #add-btn{border-color:rgba(245,197,24,.3);color:#f5c518}
    #add-btn:hover{background:rgba(245,197,24,.1)}
    .divider{width:1px;height:20px;background:var(--border);display:none}
    #username,#role-badge{font-family:'Cinzel',serif;font-size:.55rem;display:none}
    .role-badge{padding:3px 8px;border-radius:2px;border:1px solid;text-transform:uppercase;letter-spacing:.08em}
    .role-creator{color:#f5c518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08)}
    #signout-btn{display:none;color:#666}
    
    #page{display:flex;min-height:calc(100vh - 50px)}
    #sidebar{width:250px;border-right:1px solid var(--border);padding:20px;overflow-y:auto;height:calc(100vh - 50px)}
    .section-title{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:#555;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    #search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:8px;color:var(--white);font-family:inherit;font-size:.9rem;margin-bottom:20px}
    #search:focus{outline:none;border-color:rgba(255,255,255,.3)}
    .filter-group{margin-bottom:15px}
    select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:7px;color:var(--white);font-family:inherit;cursor:pointer;margin-top:5px}
    select:focus{outline:none;border-color:rgba(255,255,255,.3)}
    
    #main{flex:1;display:flex;flex-direction:column;padding:20px}
    .card-count{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--grey);margin-bottom:15px}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;overflow-y:auto}
    .card{background:var(--surface);border:1px solid #222;border-radius:3px;overflow:hidden;cursor:pointer;transition:all .15s}
    .card:hover{border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
    .card-img{width:100%;aspect-ratio:3/4;background:#000;overflow:hidden}
    .card-img img{width:100%;height:100%;object-fit:cover}
    .card-body{padding:10px;font-size:.8rem}
    .card-name{font-family:'Cinzel',serif;font-size:.7rem;color:var(--white);margin-bottom:5px}
    .card-meta{color:var(--grey);font-size:.7rem;margin-bottom:5px}
    .card-stats{color:#666;font-size:.65rem;margin-top:5px}
    #empty{text-align:center;color:#444;padding:60px 20px;font-family:'Cinzel',serif}
    
    .modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:3px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
    .modal-title{font-family:'Cinzel Decorative',serif;font-size:1rem;margin-bottom:15px}
    .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--grey);font-size:1.2rem;cursor:pointer}
    .field{margin-bottom:12px}
    .field label{display:block;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-bottom:5px}
    .field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:8px;color:var(--white);font-family:inherit;font-size:.9rem}
    .field textarea{resize:vertical;min-height:70px}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:rgba(255,255,255,.3)}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .submit-btn{width:100%;padding:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:2px;color:var(--white);font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:10px}
    .submit-btn:hover{background:rgba(255,255,255,.15)}
    .submit-btn:disabled{opacity:.4;cursor:not-allowed}
    .msg{font-size:.7rem;text-align:center;margin-top:8px;min-height:16px;font-family:'Cinzel',serif}
    .msg.err{color:var(--red)}
    .msg.ok{color:var(--green)}
  </style>
</head>
<body>

<div id="topbar">
  <a class="back-btn" href="index.html">← Back</a>
  <div class="topbar-title">Card Database</div>
  <div id="topbar-right">
    <button class="topbar-btn" id="refresh-btn" onclick="loadCards()">🔄</button>
    <button class="topbar-btn" id="add-btn" onclick="openAddModal()">✏️ Add</button>
    <div class="divider" id="div1"></div>
    <span id="username"></span>
    <span class="role-badge" id="role-badge"></span>
    <div class="divider" id="div2"></div>
    <button class="topbar-btn" id="signout-btn" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div id="page">
  <div id="sidebar">
    <div class="section-title">Search</div>
    <input id="search" type="text" placeholder="Search cards…" oninput="filter()"/>
    
    <div style="margin-top:20px">
      <div class="section-title">Filters</div>
      <div class="filter-group">
        <label style="font-family:'Cinzel',serif;font-size:.55rem;color:var(--grey);text-transform:uppercase">Element</label>
        <select id="f-element" onchange="filter()">
          <option value="">All</option>
          <option value="solis">Solis</option>
          <option value="ignus">Ignus</option>
          <option value="silva">Silva</option>
        </select>
      </div>
      <div class="filter-group">
        <label style="font-family:'Cinzel',serif;font-size:.55rem;color:var(--grey);text-transform:uppercase">Type</label>
        <select id="f-type" onchange="filter()">
          <option value="">All</option>
          <option value="caster">Caster</option>
          <option value="barrier">Barrier</option>
        </select>
      </div>
      <div class="filter-group">
        <label style="font-family:'Cinzel',serif;font-size:.55rem;color:var(--grey);text-transform:uppercase">Rarity</label>
        <select id="f-rarity" onchange="filter()">
          <option value="">All</option>
          <option value="common">Common</option>
          <option value="uncommon">Uncommon</option>
        </select>
      </div>
    </div>
  </div>

  <div id="main">
    <div class="card-count" id="count">Loading…</div>
    <div id="grid"></div>
    <div id="empty" style="display:none">No cards found</div>
  </div>
</div>

<div class="modal" id="add-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <div class="modal-title" id="modal-title">Add Card</div>
    
    <div class="field"><label>Name *</label><input id="c-name" type="text"/></div>
    <div class="field"><label>Element</label><select id="c-element"><option value="solis">Solis</option><option value="ignus">Ignus</option><option value="silva">Silva</option></select></div>
    <div class="field"><label>Type</label><select id="c-type"><option value="caster">Caster</option><option value="barrier">Barrier</option></select></div>
    <div class="field"><label>Rarity</label><select id="c-rarity"><option value="common">Common</option><option value="uncommon">Uncommon</option></select></div>
    <div class="row-2">
      <div class="field"><label>ATK</label><input id="c-atk" type="number" value="0"/></div>
      <div class="field"><label>DEF</label><input id="c-def" type="number" value="0"/></div>
    </div>
    <div class="field"><label>Aether Cost</label><input id="c-aether" type="number" value="0"/></div>
    <div class="field"><label>Image URL</label><input id="c-img" type="text"/></div>
    <div class="field"><label>Description</label><textarea id="c-desc"></textarea></div>
    
    <button class="submit-btn" id="save-btn" onclick="saveCard()">Save Card</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const SB_URL = 'https://bcqgrxzhjawxqwceflpk.supabase.co';
const SB_KEY = 'sb_publishable_dhuEDL-DJP4_mD4PUVIevg_1u_gjA-j';
const sb = supabase.createClient(SB_URL, SB_KEY);

const CARDS = [
  {id:1, name:"Orange Peko Lv1", element:"solis", "card type":"caster", rarity:"common", atk:100, def:50, "aether cost":2, "image url":"https://cdn.buylist.ca/Single_Card_Images/watermarked/casterchronicles/the-magic-battle-begins/Orange_Peko_Lv1__The_Magic_Battle_Begins_147241_3514528.webp", description:"A fox spirit of modest power."}
];

let all = [];
let user = null;
let profile = null;

async function init() {
  const {data:{session}} = await sb.auth.getSession();
  if(session?.user) {
    user = session.user;
    const {data} = await sb.from('profiles').select('*').eq('id', session.user.id).single().catch(()=>({data:null}));
    profile = data;
  }
  updateUI();
  loadCards();
}

sb.auth.onAuthStateChange((e,s) => {
  if(e === 'SIGNED_OUT') user = profile = null;
  else if(s?.user) user = s.user;
  updateUI();
});

function updateUI() {
  const un = document.getElementById('username');
  const rb = document.getElementById('role-badge');
  const d1 = document.getElementById('div1');
  const d2 = document.getElementById('div2');
  const ab = document.getElementById('add-btn');
  const sb = document.getElementById('signout-btn');
  
  if(profile) {
    un.textContent = profile.username;
    un.style.display = '';
    rb.textContent = profile.role === 'creator' ? '👑 Creator' : '✏️ Editor';
    rb.className = 'role-badge role-creator';
    rb.style.display = '';
    d1.style.display = '';
    d2.style.display = '';
    ab.style.display = '';
    sb.style.display = '';
  } else if(user) {
    un.textContent = user.email;
    un.style.display = '';
    d1.style.display = '';
    d2.style.display = '';
    sb.style.display = '';
  } else {
    un.style.display = 'none';
    rb.style.display = 'none';
    d1.style.display = 'none';
    d2.style.display = 'none';
    ab.style.display = 'none';
    sb.style.display = 'none';
  }
}

function loadCards() {
  all = [...CARDS];
  filter();
}

function filter() {
  const search = document.getElementById('search').value.toLowerCase();
  const elem = document.getElementById('f-element').value;
  const typ = document.getElementById('f-type').value;
  const rar = document.getElementById('f-rarity').value;
  
  let cards = all.filter(c => {
    if(search && !c.name.toLowerCase().includes(search)) return false;
    if(elem && c.element !== elem) return false;
    if(typ && c['card type'] !== typ) return false;
    if(rar && c.rarity !== rar) return false;
    return true;
  });
  
  render(cards);
}

function render(cards) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');
  
  count.textContent = cards.length + ' card' + (cards.length !== 1 ? 's' : '');
  
  if(!cards.length) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  
  empty.style.display = 'none';
  grid.innerHTML = cards.map((c,i) => `
    <div class="card">
      <div class="card-img"><img src="${c['image url']}" alt="${c.name}"></div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">${c.element} • ${c['card type']}</div>
        <div class="card-stats">ATK ${c.atk} | DEF ${c.def}</div>
      </div>
    </div>
  `).join('');
}

function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('c-name').focus();
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function saveCard() {
  const name = document.getElementById('c-name').value.trim();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('save-btn');
  
  if(!name) {
    msg.textContent = 'Name required';
    msg.className = 'msg err';
    return;
  }
  
  const card = {
    id: Math.max(...all.map(c => c.id || 0), 0) + 1,
    name,
    element: document.getElementById('c-element').value,
    'card type': document.getElementById('c-type').value,
    rarity: document.getElementById('c-rarity').value,
    atk: parseInt(document.getElementById('c-atk').value) || 0,
    def: parseInt(document.getElementById('c-def').value) || 0,
    'aether cost': parseInt(document.getElementById('c-aether').value) || 0,
    'image url': document.getElementById('c-img').value,
    description: document.getElementById('c-desc').value
  };
  
  btn.disabled = true;
  msg.textContent = 'Saving…';
  msg.className = 'msg';
  
  setTimeout(() => {
    all.push(card);
    msg.textContent = '✓ Card added!';
    msg.className = 'msg ok';
    btn.disabled = false;
    
    setTimeout(() => {
      closeAddModal();
      document.getElementById('c-name').value = '';
      document.getElementById('c-desc').value = '';
      filter();
    }, 1000);
  }, 300);
}

async function signOut() {
  await sb.auth.signOut();
  user = profile = null;
  updateUI();
}

init();
</script>
</body>
</html>
