<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Database — Caster Chronicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080808; --surface:#111; --surface2:#181818;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.06);
      --white:#f0f0f0; --grey:#888; --grey-dim:#444;
      --red:#e53935; --green:#4caf50;
      --solis:#f5c518; --ignus:#ff5722; --silva:#66bb6a; --terra:#a1887f;
      --luna:#ce93d8; --aqua:#4fc3f7; --aes:#90a4ae; --void:#616161;
      --common:#9e9e9e; --uncommon:#66bb6a; --rare:#42a5f5;
      --super-rare:#ab47bc; --ultra-rare:#ffa726; --secret-rare:#ef5350;
      --hyper-rare:#f5c518; --repack:#78909c; --promo:#26c6da;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:'Crimson Pro',serif;}

    /* TOPBAR */
    #topbar{
      position:sticky;top:0;z-index:50;
      background:rgba(8,8,8,0.95);border-bottom:1px solid var(--border2);
      backdrop-filter:blur(8px);display:flex;align-items:center;
      padding:0 24px;height:49px;gap:8px;
    }
    .back-btn{
      font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.16em;
      text-transform:uppercase;color:var(--grey);text-decoration:none;
      border:1px solid var(--border);border-radius:2px;padding:5px 12px;
      transition:color .2s,border-color .2s;white-space:nowrap;
    }
    .back-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
    .topbar-title{
      font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--white);
      position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;
    }
    #topbar-right{
      margin-left:auto;display:flex;align-items:center;gap:10px;
    }
    .topbar-divider{width:1px;height:16px;background:var(--border);}
    #toggle-add-btn{
      display:none;font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.1em;
      padding:5px 12px;border-radius:2px;
      border:1px solid rgba(245,197,24,.3);background:rgba(245,197,24,.06);
      color:#f5c518;cursor:pointer;white-space:nowrap;transition:background .2s;
    }
    #toggle-add-btn:hover{background:rgba(245,197,24,.14);}
    #topbar-username{
      font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;
      color:var(--white);white-space:nowrap;
    }
    .role-badge{
      font-size:.55rem;font-family:'Cinzel',serif;letter-spacing:.08em;
      padding:2px 7px;border-radius:2px;font-weight:700;
      text-transform:uppercase;border:1px solid;
    }
    .role-creator{color:#f5c518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08);}
    .role-admin{color:#e53935;border-color:rgba(229,57,53,.3);background:rgba(229,57,53,.08);}
    .role-card_editor{color:#90caf9;border-color:rgba(144,202,249,.3);background:rgba(144,202,249,.08);}
    .role-moderator{color:#80cbc4;border-color:rgba(128,203,196,.3);background:rgba(128,203,196,.08);}
    .role-supporter{color:#b0bec5;border-color:rgba(176,190,197,.3);background:rgba(176,190,197,.08);}
    .role-player{color:#888;border-color:rgba(100,100,100,.3);background:rgba(100,100,100,.08);}
    #topbar-signin-btn{
      font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.1em;
      padding:5px 12px;border-radius:2px;
      border:1px solid rgba(255,255,255,.15);background:transparent;
      color:var(--grey);cursor:pointer;white-space:nowrap;
      transition:color .2s,border-color .2s;
    }
    #topbar-signin-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}
    #topbar-signout-btn{
      display:none;font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.1em;
      padding:5px 12px;border-radius:2px;
      border:1px solid rgba(255,255,255,.1);background:transparent;
      color:#666;cursor:pointer;white-space:nowrap;
      transition:color .2s,border-color .2s;
    }
    #topbar-signout-btn:hover{color:var(--white);border-color:rgba(255,255,255,.25);}

    /* LAYOUT */
    #page{display:flex;min-height:calc(100vh - 49px);}
    #sidebar{
      width:260px;flex-shrink:0;border-right:1px solid var(--border2);
      padding:20px 18px;display:flex;flex-direction:column;gap:20px;
      position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;
    }
    .sidebar-section-title{
      font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;
      text-transform:uppercase;color:var(--grey-dim);margin-bottom:10px;
      padding-bottom:6px;border-bottom:1px solid var(--border2);
    }
    #search-input{
      width:100%;background:var(--surface);border:1px solid var(--border);
      border-radius:2px;padding:8px 12px;color:var(--white);
      font-family:'Crimson Pro',serif;font-size:.9rem;outline:none;transition:border-color .2s;
    }
    #search-input:focus{border-color:rgba(255,255,255,.3);}
    #search-input::placeholder{color:var(--grey-dim);}
    .filter-group{display:flex;flex-direction:column;gap:6px;}
    .filter-label{
      font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.18em;
      text-transform:uppercase;color:var(--grey);margin-bottom:2px;
    }
    .filter-select{
      width:100%;background:var(--surface);border:1px solid var(--border);
      border-radius:2px;padding:7px 10px;color:var(--white);
      font-family:'Crimson Pro',serif;font-size:.88rem;outline:none;
      transition:border-color .2s;cursor:pointer;
    }
    .filter-select:focus{border-color:rgba(255,255,255,.3);}
    .filter-select option{background:#111;}
    .reset-btn{
      width:100%;padding:8px;background:transparent;border:1px solid var(--border);
      border-radius:2px;color:var(--grey);font-family:'Cinzel',serif;
      font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
      cursor:pointer;transition:color .2s,border-color .2s;
    }
    .reset-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3);}

    /* MAIN */
    #main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow:hidden;}
    #card-count-bar{
      font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;
      text-transform:uppercase;color:var(--grey);
      display:flex;align-items:center;justify-content:space-between;
    }
    #sort-row{display:flex;align-items:center;gap:8px;}
    .sort-select{
      background:var(--surface);border:1px solid var(--border);border-radius:2px;
      padding:5px 10px;color:var(--white);font-family:'Cinzel',serif;
      font-size:.58rem;letter-spacing:.1em;outline:none;cursor:pointer;
    }
    .sort-select option{background:#111;}
    #card-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px;overflow-y:auto;max-height:calc(100vh - 140px);padding-bottom:20px;
    }
    #card-grid::-webkit-scrollbar{width:4px;}
    #card-grid::-webkit-scrollbar-thumb{background:var(--grey-dim);border-radius:2px;}
    .card-tile{
      background:var(--surface);border:1px solid var(--border2);border-radius:3px;
      overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;
      display:flex;flex-direction:column;animation:tileIn .3s ease both;
    }
    @keyframes tileIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card-tile:hover{border-color:rgba(255,255,255,.25);transform:translateY(-2px);}
    .card-image{
      width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--surface2);
      display:flex;align-items:center;justify-content:center;
      color:var(--grey-dim);font-size:.7rem;font-family:'Cinzel',serif;
      letter-spacing:.1em;text-align:center;
    }
    .card-image img{width:100%;height:100%;object-fit:cover;}
    .card-image.no-img{padding:20px;}
    .card-body{padding:10px 10px 8px;flex:1;display:flex;flex-direction:column;gap:4px;}
    .card-name{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.06em;color:var(--white);line-height:1.3;}
    .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px;}
    .card-type-badge{
      font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;
      text-transform:uppercase;color:var(--grey);border:1px solid var(--border2);padding:1px 5px;border-radius:1px;
    }
    .card-element{
      font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.08em;
      text-transform:uppercase;padding:1px 5px;border-radius:1px;border:1px solid;font-weight:700;
    }
    .el-solis{color:var(--solis);border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08);}
    .el-ignus{color:var(--ignus);border-color:rgba(255,87,34,.3);background:rgba(255,87,34,.08);}
    .el-silva{color:var(--silva);border-color:rgba(102,187,106,.3);background:rgba(102,187,106,.08);}
    .el-terra{color:var(--terra);border-color:rgba(161,136,127,.3);background:rgba(161,136,127,.08);}
    .el-luna{color:var(--luna);border-color:rgba(206,147,216,.3);background:rgba(206,147,216,.08);}
    .el-aqua{color:var(--aqua);border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.08);}
    .el-aes{color:var(--aes);border-color:rgba(144,164,174,.3);background:rgba(144,164,174,.08);}
    .el-void{color:var(--void);border-color:rgba(97,97,97,.3);background:rgba(97,97,97,.08);}
    .card-rarity{
      font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.1em;
      text-transform:uppercase;margin-top:auto;padding-top:6px;
    }
    .rar-common{color:var(--common);}.rar-uncommon{color:var(--uncommon);}
    .rar-rare{color:var(--rare);}.rar-super-rare{color:var(--super-rare);}
    .rar-ultra-rare{color:var(--ultra-rare);}.rar-secret-rare{color:var(--secret-rare);}
    .rar-hyper-rare{color:var(--hyper-rare);}.rar-repack{color:var(--repack);}.rar-promo{color:var(--promo);}
    .card-stats{display:flex;gap:8px;font-family:'Cinzel',serif;font-size:.52rem;color:var(--grey);margin-top:4px;}
    #empty-state{
      grid-column:1/-1;text-align:center;padding:60px 20px;
      color:var(--grey-dim);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
    }

    /* DETAIL MODAL */
    #detail-overlay{
      position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.88);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    #detail-overlay.open{opacity:1;pointer-events:all;}
    #detail-box{
      background:var(--surface);border:1px solid var(--border);border-radius:3px;
      width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative;
      transform:translateY(16px) scale(.97);transition:transform .25s ease;display:flex;
    }
    #detail-overlay.open #detail-box{transform:translateY(0) scale(1);}
    #detail-box::-webkit-scrollbar{width:3px;}
    #detail-box::-webkit-scrollbar-thumb{background:var(--grey-dim);border-radius:2px;}
    #detail-img{
      width:200px;flex-shrink:0;background:var(--surface2);
      display:flex;align-items:center;justify-content:center;
      color:var(--grey-dim);font-size:.65rem;font-family:'Cinzel',serif;text-align:center;padding:10px;
    }
    #detail-img img{width:100%;height:100%;object-fit:cover;}
    #detail-content{flex:1;padding:24px 22px;display:flex;flex-direction:column;gap:12px;}
    #detail-close{
      position:absolute;top:12px;right:14px;background:none;border:none;
      cursor:pointer;color:var(--grey-dim);font-size:1rem;transition:color .2s;
    }
    #detail-close:hover{color:var(--white);}
    .detail-name{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--white);line-height:1.2;}
    .detail-badges{display:flex;gap:6px;flex-wrap:wrap;}
    .detail-section-label{
      font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;
      text-transform:uppercase;color:var(--grey-dim);margin-bottom:3px;
    }
    .detail-text{font-size:.88rem;color:var(--white);line-height:1.5;}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
    .detail-field{display:flex;flex-direction:column;gap:2px;}
    .detail-value{font-family:'Cinzel',serif;font-size:.68rem;color:var(--white);}
    .detail-del-btn{
      margin-top:auto;padding:9px;background:rgba(229,57,53,.08);
      border:1px solid rgba(229,57,53,.3);border-radius:2px;
      color:var(--red);font-family:'Cinzel',serif;font-size:.62rem;
      letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .2s;
    }
    .detail-del-btn:hover{background:rgba(229,57,53,.18);}

    /* ADD CARD MODAL */
    #add-card-modal{
      display:none;position:fixed;inset:0;z-index:200;
      background:rgba(0,0,0,.85);backdrop-filter:blur(4px);
      align-items:flex-start;justify-content:center;
      overflow-y:auto;padding:40px 20px;
    }
    #add-card-modal.open{display:flex;}
    #add-card-modal-box{
      background:var(--surface);border:1px solid var(--border);border-radius:4px;
      width:500px;max-width:100%;padding:28px;position:relative;flex-shrink:0;
      display:flex;flex-direction:column;gap:10px;
    }
    .modal-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--white);margin-bottom:8px;text-align:center;}
    .m-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--grey);font-size:1rem;cursor:pointer;}
    .m-close:hover{color:var(--white);}
    .field{display:flex;flex-direction:column;gap:4px;}
    .field label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);}
    .field input,.field select,.field textarea{
      background:var(--surface);border:1px solid var(--border);border-radius:2px;
      padding:7px 10px;color:var(--white);font-family:'Crimson Pro',serif;
      font-size:.88rem;outline:none;transition:border-color .2s;width:100%;
    }
    .field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,255,255,.3);}
    .field select option{background:#111;}
    .field textarea{resize:vertical;min-height:60px;}
    .field input[type="number"]{-moz-appearance:textfield;}
    .field input[type="number"]::-webkit-inner-spin-button{opacity:.4;}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .submit-btn{
      padding:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);
      border-radius:2px;color:var(--white);font-family:'Cinzel',serif;
      font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;
      cursor:pointer;transition:background .2s;margin-top:2px;
    }
    .submit-btn:hover{background:rgba(255,255,255,.14);}
    .submit-btn:disabled{opacity:.35;cursor:not-allowed;}
    .form-err{font-size:.7rem;color:var(--red);text-align:center;min-height:14px;}
    .form-ok{font-size:.7rem;color:var(--green);text-align:center;min-height:14px;}

    /* TOAST */
    #toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(12px);
      background:var(--surface);border:1px solid var(--border);border-radius:2px;
      padding:8px 20px;font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.14em;
      color:var(--white);z-index:300;opacity:0;
      transition:opacity .25s,transform .25s;pointer-events:none;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:700px){
      #sidebar{width:100%;position:static;height:auto;border-right:none;border-bottom:1px solid var(--border2);}
      #page{flex-direction:column;}
      #detail-box{flex-direction:column;}
      #detail-img{width:100%;height:200px;}
      .topbar-title{font-size:.7rem;}
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <a class="back-btn" href="index.html">← Back</a>
  <div class="topbar-title">Card Database</div>
  <div id="topbar-right">
    <button id="toggle-add-btn" onclick="toggleAddForm()">✏️ Add Card</button>
    <div class="topbar-divider" id="div-username" style="display:none;"></div>
    <span id="topbar-username"></span>
    <span class="role-badge" id="topbar-badge" style="display:none;"></span>
    <div class="topbar-divider" id="div-action" style="display:none;"></div>
    <button id="topbar-signin-btn" onclick="openAuthModal()">Sign In</button>
    <button id="topbar-signout-btn" onclick="signOut()">Sign Out</button>
  </div>
</div>

<!-- AUTH MODAL -->
<div id="auth-modal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:#111;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:30px;width:320px;display:flex;flex-direction:column;gap:14px;">
    <div style="font-family:'Cinzel Decorative',serif;font-size:.9rem;color:#f0f0f0;text-align:center;" id="auth-modal-title">Sign In</div>
    <input id="auth-email" type="email" placeholder="Email" style="background:#0a0a0a;border:1px solid rgba(255,255,255,.1);border-radius:2px;padding:10px;color:#f0f0f0;font-family:'Cinzel',serif;font-size:.7rem;outline:none;"/>
    <input id="auth-password" type="password" placeholder="Password" style="background:#0a0a0a;border:1px solid rgba(255,255,255,.1);border-radius:2px;padding:10px;color:#f0f0f0;font-family:'Cinzel',serif;font-size:.7rem;outline:none;"/>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:.54rem;color:#666;">
      <input type="checkbox" id="auth-remember" checked style="cursor:pointer;accent-color:#f5c518;"/> Remember me
    </label>
    <div id="auth-modal-err" style="font-family:'Cinzel',serif;font-size:.58rem;color:#e53935;min-height:14px;"></div>
    <button onclick="submitAuth()" style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.15em;padding:10px;border-radius:2px;border:1px solid rgba(245,197,24,.3);background:rgba(245,197,24,.08);color:#f5c518;cursor:pointer;text-transform:uppercase;">Sign In</button>
    <div style="text-align:center;font-family:'Cinzel',serif;font-size:.54rem;color:#555;cursor:pointer;" onclick="toggleAuthMode()" id="auth-switch-link">Don't have an account? Register</div>
    <button onclick="closeAuthModal()" style="background:none;border:none;color:#444;font-size:.6rem;cursor:pointer;font-family:'Cinzel',serif;">Cancel</button>
  </div>
</div>

<!-- PAGE -->
<div id="page">
  <div id="sidebar">
    <div>
      <div class="sidebar-section-title">Search</div>
      <input id="search-input" type="text" placeholder="Search cards…" oninput="applyFilters()"/>
    </div>
    <div>
      <div class="sidebar-section-title">Filters</div>
      <div class="filter-group">
        <div class="filter-label">Element</div>
        <select class="filter-select" id="f-element" onchange="applyFilters()">
          <option value="">All Elements</option>
          <option value="solis">Solis</option><option value="ignus">Ignus</option>
          <option value="silva">Silva</option><option value="terra">Terra</option>
          <option value="luna">Luna</option><option value="aqua">Aqua</option>
          <option value="aes">Aes</option><option value="void">Void</option>
        </select>
        <div class="filter-label">Type</div>
        <select class="filter-select" id="f-type" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="barrier">Barrier</option><option value="caster">Caster</option>
          <option value="conjure">Conjure</option><option value="deity">Deity</option>
          <option value="servant">Servant</option><option value="soul bond servant">Soul Bond Servant</option>
        </select>
        <div class="filter-label">Set</div>
        <select class="filter-select" id="f-set" onchange="applyFilters()">
          <option value="">All Sets</option>
          <option value="modern">Modern</option><option value="legacy">Legacy</option>
        </select>
        <div class="filter-label">Rarity</div>
        <select class="filter-select" id="f-rarity" onchange="applyFilters()">
          <option value="">All Rarities</option>
          <option value="common">Common</option><option value="uncommon">Uncommon</option>
          <option value="rare">Rare</option><option value="super rare">Super Rare</option>
          <option value="ultra rare">Ultra Rare</option><option value="secret rare">Secret Rare</option>
          <option value="hyper rare">Hyper Rare</option><option value="repack">Repack</option>
          <option value="promo">Promo</option>
        </select>
        <div class="filter-label">Max Aether Cost</div>
        <input class="filter-select" id="f-aether" type="number" min="0" placeholder="Any" oninput="applyFilters()" style="font-family:'Crimson Pro',serif;"/>
      </div>
      <button class="reset-btn" style="margin-top:10px" onclick="resetFilters()">Reset Filters</button>
    </div>
  </div>

  <div id="main">
    <div id="card-count-bar">
      <span id="count-label">Loading…</span>

<script>
const SUPABASE_URL  = 'https://bcqgrxzhjawxqwceflpk.supabase.co';
const SUPABASE_ANON = 'sb_publishable_dhuEDL-DJP4_mD4PUVIevg_1u_gjA-j';
window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const sb = window.sb;

const ROLE_LABELS = {
  creator:'👑 Creator',admin:'🛡 Admin',card_editor:'✏️ Editor',
  moderator:'🔰 Mod',supporter:'💎 Supporter',player:'Player',
};
const CAN_ADD    = ['creator','admin','card_editor'];
const CAN_DELETE = ['creator','admin','moderator'];
const RARITY_ORDER = ['common','uncommon','rare','super rare','ultra rare','secret rare','hyper rare','repack','promo'];

let currentUser=null,currentProfile=null,allCards=[],currentCard=null;
window.currentUser=null;window.currentProfile=null;

function myRole(){return currentProfile?.role||null;}
function can(list){return list.includes(myRole());}

function updateAuthUI(){
  const uname     =document.getElementById('topbar-username');
  const badge     =document.getElementById('topbar-badge');
  const signinBtn =document.getElementById('topbar-signin-btn');
  const signoutBtn=document.getElementById('topbar-signout-btn');
  const toggleBtn =document.getElementById('toggle-add-btn');
  const divUser   =document.getElementById('div-username');
  const divAction =document.getElementById('div-action');

  if(currentProfile){
    uname.textContent=currentProfile.username||currentUser?.email||'';
    const role=currentProfile.role;
    badge.textContent=ROLE_LABELS[role]||role;
    badge.className=`role-badge role-${role}`;
    badge.style.display='';
    divUser.style.display='';divAction.style.display='';
    signinBtn.style.display='none';signoutBtn.style.display='';
    toggleBtn.style.display=can(CAN_ADD)?'':'none';
  } else if(currentUser){
    uname.textContent=currentUser.email;
    badge.style.display='none';
    divUser.style.display='';divAction.style.display='';
    signinBtn.style.display='none';signoutBtn.style.display='';
    toggleBtn.style.display='none';
  } else {
    uname.textContent='';badge.style.display='none';
    divUser.style.display='none';divAction.style.display='none';
    signinBtn.style.display='';signoutBtn.style.display='none';
    toggleBtn.style.display='none';
  }
}

async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session?.user){
      currentUser=session.user;window.currentUser=session.user;
      const{data}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
      currentProfile=data;window.currentProfile=data;
    }
  }catch(e){console.error('[init]',e);}
  updateAuthUI();
  await loadCards();
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_OUT'){
    currentUser=null;currentProfile=null;
    window.currentUser=null;window.currentProfile=null;
    updateAuthUI();return;
  }
  if(session?.user){
    currentUser=session.user;window.currentUser=session.user;
    updateAuthUI();
    const{data}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    currentProfile=data;window.currentProfile=data;
    updateAuthUI();
  }
});

async function toggleAddForm(){
  // Force refresh profile if not set
  if(!currentProfile&&currentUser){
    try {
      const{data}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
      if(data){
        currentProfile=data;
        window.currentProfile=data;
        updateAuthUI();
      }
    } catch(e){
      console.error('[toggleAddForm] Failed to load profile:',e);
      alert('Could not load your profile. Please refresh and try again.');
      return;
    }
  }
  
  const userRole = myRole();
  console.log('[toggleAddForm] User role:', userRole, 'Can add roles:', CAN_ADD);
  
  if(!can(CAN_ADD)){
    alert(`Your role (${userRole||'unknown'}) does not have permission to add cards.\n\nRequired roles: ${CAN_ADD.join(', ')}`);
    return;
  }
  document.getElementById('add-card-modal').classList.add('open');
}

function closeAddModal(){document.getElementById('add-card-modal').classList.remove('open');}
document.getElementById('add-card-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('add-card-modal'))closeAddModal();
});

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

async function loadCards(){
  try {
    console.log('[loadCards] Starting fetch...');
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    
    const{data,error}=await sb.from('cards').select('*');
    clearTimeout(timeoutId);
    
    console.log('[loadCards] Response received');
    console.log('[loadCards] Error:', error);
    console.log('[loadCards] Data:', data);
    
    if(error){
      console.error('[loadCards] Supabase error:', error);
      document.getElementById('empty-state').textContent='Error: '+error.message;
      return;
    }
    console.log('[loadCards] Found', data?.length || 0, 'cards');
    allCards=data||[];
    applyFilters();
  } catch(e) {
    console.error('[loadCards] Exception:', e);
    document.getElementById('empty-state').textContent='Exception: '+e.message;
  }
}

function applyFilters(){
  const search =document.getElementById('search-input').value.toLowerCase().trim();
  const element=document.getElementById('f-element').value;
  const type   =document.getElementById('f-type').value;
  const rarity =document.getElementById('f-rarity').value;
  const aether =document.getElementById('f-aether').value;
  const set    =document.getElementById('f-set').value;
  const sortBy =document.getElementById('sort-by').value;
  const sortDir=document.getElementById('sort-dir').value;

  // Map sort field names to actual column names
  const sortFieldMap = {
    'aether_cost': 'aether cost',
    'card_type': 'card type',
    'image_url': 'image url'
  };
  const actualSortBy = sortFieldMap[sortBy] || sortBy;

  let filtered=allCards.filter(c=>{
    if(search&&!c.name.toLowerCase().includes(search)&&!(c.description||'').toLowerCase().includes(search))return false;
    if(element&&c.element!==element)return false;
    if(type&&c['card type']!==type)return false;
    if(rarity&&c.rarity!==rarity)return false;
    if(set&&c['card set']!==set)return false;
    if(aether&&c['aether cost']>parseInt(aether))return false;
    return true;
  });

  filtered.sort((a,b)=>{
    let va=a[actualSortBy],vb=b[actualSortBy];
    if(sortBy==='rarity'){va=RARITY_ORDER.indexOf(va);vb=RARITY_ORDER.indexOf(vb);}
    if(va===null||va===undefined)va=sortDir==='asc'?Infinity:-Infinity;
    if(vb===null||vb===undefined)vb=sortDir==='asc'?Infinity:-Infinity;
    if(typeof va==='string')va=va.toLowerCase();
    if(typeof vb==='string')vb=vb.toLowerCase();
    if(va<vb)return sortDir==='asc'?-1:1;
    if(va>vb)return sortDir==='asc'?1:-1;
    return 0;
  });
  renderGrid(filtered);
}

function resetFilters(){
  ['search-input','f-aether'].forEach(id=>document.getElementById(id).value='');
  ['f-element','f-type','f-rarity','f-set'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sort-by').value='name';
  document.getElementById('sort-dir').value='asc';
  applyFilters();
}

function rarityClass(r){return 'rar-'+r.replace(/ /g,'-');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderGrid(cards){
  const grid=document.getElementById('card-grid');
  const label=document.getElementById('count-label');
  label.textContent=`${cards.length} card${cards.length!==1?'s':''} found`;
  if(cards.length===0){grid.innerHTML=`<div id="empty-state">No cards match your filters.</div>`;return;}
  grid.innerHTML=cards.map((c,i)=>`
    <div class="card-tile" onclick="openDetail(${c.id})" style="animation-delay:${i*0.03}s">
      <div class="card-image ${c['image url']?'':'no-img'}">
        ${c['image url']?`<img src="${escHtml(c['image url'])}" alt="${escHtml(c.name)}" onerror="this.parentElement.className='card-image no-img';this.parentElement.innerHTML='No Image';"/>`:'No Image'}
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(c.name)}</div>
        <div class="card-meta">
          <span class="card-type-badge">${escHtml(c['card type'])}</span>
          ${c['card set']?`<span class="card-type-badge" style="border-color:${c['card set']==='legacy'?'rgba(245,197,24,.3)':'rgba(79,195,247,.3)'};color:${c['card set']==='legacy'?'#f5c518':'#4fc3f7'}">${c['card set']==='legacy'?'Legacy':'Modern'}</span>`:''}
          <span class="card-element el-${c.element}">${c.element}</span>
        </div>
        ${(c.atk!==null||c.def!==null)?`<div class="card-stats">${c.atk!==null?`ATK <span>${c.atk}</span>`:''} ${c.def!==null?`DEF <span>${c.def}</span>`:''} ${c['aether cost']!==undefined?`✦ <span>${c['aether cost']}</span>`:''}</div>`:''}
        <div class="card-rarity ${rarityClass(c.rarity)}">${c.rarity}</div>
      </div>
    </div>`).join('');
}

function openDetail(id){
  const c=allCards.find(x=>x.id===id);if(!c)return;
  currentCard=c;
  const imgEl=document.getElementById('detail-img');
  imgEl.innerHTML=c['image url']?`<img src="${escHtml(c['image url'])}" alt="${escHtml(c.name)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.textContent='No Image'"/>`:'No Image';
  document.getElementById('d-name').textContent=c.name;
  document.getElementById('d-badges').innerHTML=`
    <span class="card-element el-${c.element}">${c.element}</span>
    <span class="card-type-badge">${escHtml(c['card type'])}</span>
    <span class="card-rarity ${rarityClass(c.rarity)}">${c.rarity}</span>
    ${c['aether cost']!==null?`<span class="card-type-badge">✦ ${c['aether cost']} Aether</span>`:''}`;
  const descS=document.getElementById('d-desc-section');
  document.getElementById('d-desc').textContent=c.description||'';
  descS.style.display=c.description?'':'none';
  const abilS=document.getElementById('d-ability-section');
  document.getElementById('d-ability').textContent=c['special ability']||'';
  abilS.style.display=c['special ability']?'':'none';
  document.getElementById('d-grid').innerHTML=[
    ['ATK',c.atk!==null?c.atk:'—'],['DEF',c.def!==null?c.def:'—'],
    ['Race / Trait',c.race_trait||'—'],['Artist',c.artist||'—'],
  ].map(([l,v])=>`<div class="detail-field"><div class="detail-section-label">${l}</div><div class="detail-value">${escHtml(String(v))}</div></div>`).join('');
  document.getElementById('d-del-btn').style.display=can(CAN_DELETE)?'':'none';
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e){if(e.target===document.getElementById('detail-overlay'))closeDetailBtn();}
function closeDetailBtn(){document.getElementById('detail-overlay').classList.remove('open');currentCard=null;}

async function deleteCurrentCard(){
  if(!currentCard)return;
  const{error}=await sb.from('cards').delete().eq('id',currentCard.id);
  if(error){showToast('Error: '+error.message);return;}
  const name=currentCard.name;
  closeDetailBtn();
  allCards=allCards.filter(c=>c.id!==currentCard?.id);
  applyFilters();showToast(`"${name}" removed.`);
}

/* EFFECT BUILDER */
const TRIGGERS={on_play:'When Played',on_attack:'When This Attacks',on_destroy:'When This Is Destroyed',on_break:'When This Breaks an Orb',turn_start:'Start of Your Turn',turn_end:'End of Your Turn',on_orb_broken:'When Your Orb Is Broken',on_opponent_play:'When Opponent Plays a Card',on_damage:'When This Takes Damage',continuous:'Continuous (Always Active)'};
const ACTIONS={draw:'Draw Cards',destroy:'Destroy Servant',boost:'Boost ATK/DEF',negate:'Negate Effect/Attack',search:'Search Deck',return:'Return to Hand',banish:'Banish',extra_attack:'Grant Extra Attack',protect:'Protect from Destruction',gain_aether:'Gain Aether',copy_effect:'Copy Effect',buff_element:'Buff All of Element',direct_orb:'Direct Orb Damage',change_position:'Change Servant Position',special:'Custom / Manual Effect'};
const TARGETS={self:'This Card',selected_opponent_servant:'Selected Opponent Servant',all_opponent_servants:'All Opponent Servants',selected_friendly:'Selected Friendly Servant',all_friendly:'All Friendly Servants',current_effect:'Current Effect',current_attack:'Current Attack',selected_field_servant:'Any Field Servant'};
let effectBlocks=[],blockIdCounter=0;
function toggleBreakType(){document.getElementById('c-break-type').style.display=document.getElementById('c-has-break').checked?'':'none';}
function addEffectBlock(){effectBlocks.push({id:blockIdCounter++,trigger:'on_play',condition:null,actions:[]});renderEffectBlocks();}
function removeEffectBlock(id){effectBlocks=effectBlocks.filter(b=>b.id!==id);renderEffectBlocks();}
function addAction(blockId){const b=effectBlocks.find(b=>b.id===blockId);if(b){b.actions.push({type:'draw',amount:1});renderEffectBlocks();}}
function removeAction(blockId,aIdx){const b=effectBlocks.find(b=>b.id===blockId);if(b){b.actions.splice(aIdx,1);renderEffectBlocks();}}
function updateTrigger(blockId,val){const b=effectBlocks.find(b=>b.id===blockId);if(b)b.trigger=val;}
function updateActionType(blockId,aIdx,val){const b=effectBlocks.find(b=>b.id===blockId);if(!b)return;b.actions[aIdx]=getDefaultAction(val);renderEffectBlocks();}
function updateActionField(blockId,aIdx,field,val){const b=effectBlocks.find(b=>b.id===blockId);if(!b)return;const nf=['amount','atk','def','value'];b.actions[aIdx][field]=nf.includes(field)?(val===''?0:parseInt(val)):val;}
function getDefaultAction(type){const d={draw:{type:'draw',amount:1},destroy:{type:'destroy',target:'selected_opponent_servant'},boost:{type:'boost',target:'self',atk:300,def:0},negate:{type:'negate',target:'current_attack'},search:{type:'search',filter:{card_type:'servant'}},return:{type:'return',target:'selected_opponent_servant'},banish:{type:'banish',target:'selected_opponent_servant'},extra_attack:{type:'extra_attack',amount:1},protect:{type:'protect',duration:'until_end_of_turn'},gain_aether:{type:'gain_aether',amount:2},copy_effect:{type:'copy_effect',target:'selected_field_servant'},buff_element:{type:'buff_element',element:'ignus',atk:200,def:0},direct_orb:{type:'direct_orb',amount:1},change_position:{type:'change_position',target:'selected_opponent_servant',position:'defense'},special:{type:'special',id:'',description:''}};return d[type]||{type};}
function renderActionFields(b,a,aIdx){
  const sel=(field,options,val)=>`<select onchange="updateActionField(${b.id},${aIdx},'${field}',this.value)" style="margin-top:3px;width:100%;background:#111;border:1px solid var(--border2);color:var(--white);padding:3px 5px;border-radius:2px;font-size:.6rem;">${options.map(([v,l])=>`<option value="${v}"${val===v?' selected':''}>${l}</option>`).join('')}</select>`;
  const inp=(field,val,type='text',ph='')=>`<input type="${type}" value="${val??''}" placeholder="${ph}" onchange="updateActionField(${b.id},${aIdx},'${field}',this.value)" style="margin-top:3px;width:100%;background:#111;border:1px solid var(--border2);color:var(--white);padding:3px 5px;border-radius:2px;font-size:.6rem;"/>`;
  switch(a.type){
    case 'draw':case 'gain_aether':case 'extra_attack':case 'direct_orb':return `Amount: ${inp('amount',a.amount,'number')}`;
    case 'destroy':case 'return':case 'banish':case 'copy_effect':return `Target: ${sel('target',Object.entries(TARGETS),a.target)}`;
    case 'negate':return `Target: ${sel('target',[['current_attack','Current Attack'],['current_effect','Current Effect']],a.target)}`;
    case 'boost':return `Target: ${sel('target',Object.entries(TARGETS),a.target)}<br/>ATK +${inp('atk',a.atk,'number')} DEF +${inp('def',a.def,'number')}`;
    case 'protect':return `Duration: ${sel('duration',[['until_end_of_turn','Until End of Turn'],['permanent','Permanent']],a.duration)}`;
    case 'change_position':return `Target: ${sel('target',Object.entries(TARGETS),a.target)}<br/>Position: ${sel('position',[['attack','Attack'],['defense','Defense']],a.position)}`;
    case 'buff_element':return `Element: ${sel('element',[['solis','Solis'],['ignus','Ignus'],['silva','Silva'],['terra','Terra'],['luna','Luna'],['aqua','Aqua'],['aes','Aes'],['void','Void']],a.element)}<br/>ATK +${inp('atk',a.atk,'number')} DEF +${inp('def',a.def,'number')}`;
    case 'search':return `Card Type: ${sel('filter',Object.entries({servant:'Servant',caster:'Caster',conjure:'Conjure',barrier:'Barrier',deity:'Deity'}),a.filter?.card_type||'servant')}`;
    case 'special':return `ID: ${inp('id',a.id,'text','unique_id')}<br/>Description: ${inp('description',a.description,'text','What happens…')}`;
    default:return '';
  }
}
function renderEffectBlocks(){
  const el=document.getElementById('effect-blocks');
  if(effectBlocks.length===0){el.innerHTML='<div style="font-size:.6rem;color:var(--grey);font-family:\'Cinzel\',serif;letter-spacing:.1em;">No effects — click + Effect to add one</div>';return;}
  el.innerHTML=effectBlocks.map(b=>`
    <div style="background:#0d0d0d;border:1px solid var(--border2);border-radius:3px;padding:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <select onchange="updateTrigger(${b.id},this.value)" style="background:#111;border:1px solid var(--border);color:var(--white);padding:4px 8px;border-radius:2px;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;flex:1;">
          ${Object.entries(TRIGGERS).map(([v,l])=>`<option value="${v}"${b.trigger===v?' selected':''}>${l}</option>`).join('')}
        </select>
        <button onclick="removeEffectBlock(${b.id})" style="margin-left:8px;background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.3);color:var(--red);padding:3px 8px;border-radius:2px;cursor:pointer;font-size:.6rem;">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${b.actions.map((a,aIdx)=>`
          <div style="background:#111;border:1px solid var(--border2);border-radius:2px;padding:8px;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <select onchange="updateActionType(${b.id},${aIdx},this.value)" style="flex:1;background:#0a0a0a;border:1px solid var(--border2);color:var(--white);padding:3px 6px;border-radius:2px;font-size:.6rem;">
                ${Object.entries(ACTIONS).map(([v,l])=>`<option value="${v}"${a.type===v?' selected':''}>${l}</option>`).join('')}
              </select>
              <button onclick="removeAction(${b.id},${aIdx})" style="background:none;border:none;color:var(--grey);cursor:pointer;font-size:.8rem;padding:0 4px;">✕</button>
            </div>
            <div style="font-size:.58rem;color:var(--grey);">${renderActionFields(b,a,aIdx)}</div>
          </div>`).join('')}
        <button onclick="addAction(${b.id})" style="font-size:.58rem;padding:4px;background:rgba(255,255,255,.04);border:1px dashed var(--border2);border-radius:2px;color:var(--grey);cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.1em;">+ Add Action</button>
      </div>
    </div>`).join('');
  updateJsonPreview();
}
function buildEffectData(){if(effectBlocks.length===0)return null;return{effects:effectBlocks.map(b=>({trigger:b.trigger,condition:b.condition,actions:b.actions}))};}
function toggleJsonPreview(){const el=document.getElementById('effect-json-preview');el.style.display=el.style.display==='none'?'':'none';updateJsonPreview();}
function updateJsonPreview(){const el=document.getElementById('effect-json-preview');if(el.style.display!=='none')el.textContent=JSON.stringify(buildEffectData(),null,2);}

async function addCard(){
  const name=document.getElementById('c-name').value.trim();
  const element=document.getElementById('c-element').value;
  const type=document.getElementById('c-type').value;
  const rarity=document.getElementById('c-rarity').value;
  const atk=document.getElementById('c-atk').value;
  const def=document.getElementById('c-def').value;
  const aether=document.getElementById('c-aether').value;
  const race=document.getElementById('c-race').value.trim();
  const artist=document.getElementById('c-artist').value.trim();
  const desc=document.getElementById('c-desc').value.trim();
  const ability=document.getElementById('c-ability').value.trim();
  const img=document.getElementById('c-img').value.trim();
  const err=document.getElementById('form-err');
  const ok=document.getElementById('form-ok');
  const btn=document.getElementById('add-btn');
  err.textContent='';ok.textContent='';
  if(!name){err.textContent='Card name is required.';return;}
  btn.disabled=true;btn.textContent='Adding…';
  const hasBreak=document.getElementById('c-has-break').checked;
  const breakType=document.getElementById('c-break-type').value;
  const effectData=buildEffectData();
  const{data,error}=await sb.from('cards').insert({
    name,element,card_type:type,rarity,
    atk:atk!==''?parseInt(atk):null,
    def:def!==''?parseInt(def):null,
    aether_cost:aether!==''?parseInt(aether):0,
    race_trait:race||null,artist:artist||null,
    description:desc||null,special_ability:ability||null,
    image_url:img||null,added_by:currentUser?.id,
    card_set:document.getElementById('c-set').value||'modern',
    has_break:hasBreak,break_type:hasBreak?breakType:null,
    effect_data:effectData,
  }).select().single();
  btn.disabled=false;btn.textContent='+ Add Card';
  if(error){err.textContent=error.message;return;}
  ok.textContent=`✓ "${name}" added!`;
  allCards.unshift(data);applyFilters();
  effectBlocks=[];blockIdCounter=0;renderEffectBlocks();
  document.getElementById('c-has-break').checked=false;
  document.getElementById('c-break-type').style.display='none';
  ['c-name','c-atk','c-def','c-aether','c-race','c-artist','c-desc','c-ability','c-img'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('c-name').focus();
  setTimeout(()=>{ok.textContent='';},4000);
}

let authMode='signin';
function openAuthModal(){authMode='signin';document.getElementById('auth-modal-title').textContent='Sign In';document.getElementById('auth-switch-link').textContent="Don't have an account? Register";document.getElementById('auth-modal-err').textContent='';document.getElementById('auth-modal').style.display='flex';}
function closeAuthModal(){document.getElementById('auth-modal').style.display='none';}
function toggleAuthMode(){authMode=authMode==='signin'?'register':'signin';document.getElementById('auth-modal-title').textContent=authMode==='signin'?'Sign In':'Register';document.getElementById('auth-switch-link').textContent=authMode==='signin'?"Don't have an account? Register":'Already have an account? Sign In';document.getElementById('auth-modal-err').textContent='';}
async function submitAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  const remember=document.getElementById('auth-remember')?.checked??true;
  const err=document.getElementById('auth-modal-err');
  if(!email||!pass){err.textContent='Email and password required.';return;}
  let result;
  if(authMode==='signin')result=await sb.auth.signInWithPassword({email,password:pass,options:{persistSession:remember}});
  else result=await sb.auth.signUp({email,password:pass});
  if(result.error){err.textContent=result.error.message;return;}
  closeAuthModal();location.reload();
}
async function signOut(){
  await sb.auth.signOut();
  currentUser=null;currentProfile=null;window.currentUser=null;window.currentProfile=null;
  updateAuthUI();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeAddModal();closeDetailBtn();}
  if(e.key==='Enter'&&document.getElementById('add-card-modal').classList.contains('open')){
    const tag=document.activeElement.tagName;
    if(tag!=='TEXTAREA'&&tag!=='SELECT')addCard();
  }
});

renderEffectBlocks();
init();
</script>
</body>
