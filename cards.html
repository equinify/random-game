<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Database — Caster Chronicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#080808; --surface:#111; --surface2:#181818;
      --border:rgba(255,255,255,.1); --border2:rgba(255,255,255,.06);
      --white:#f0f0f0; --grey:#888; --grey-dim:#444;
      --red:#e53935; --green:#4caf50;
      --solis:#f5c518; --ignus:#ff5722; --silva:#66bb6a; --terra:#a1887f;
      --luna:#ce93d8; --aqua:#4fc3f7; --aes:#90a4ae; --void:#616161;
      --common:#9e9e9e; --uncommon:#66bb6a; --rare:#42a5f5;
      --super-rare:#ab47bc; --ultra-rare:#ffa726; --secret-rare:#ef5350;
      --hyper-rare:#f5c518; --repack:#78909c; --promo:#26c6da;
    }
    html,body { min-height:100%; background:var(--bg); color:var(--white); font-family:'Crimson Pro',serif; }

    /* ── TOPBAR ── */
    #topbar {
      position:sticky; top:0; z-index:50;
      background:rgba(8,8,8,.96); border-bottom:1px solid var(--border2);
      backdrop-filter:blur(8px);
      display:flex; align-items:center; height:49px; padding:0 24px; gap:12px;
    }
    .back-btn {
      font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.16em;
      text-transform:uppercase; color:var(--grey); text-decoration:none;
      border:1px solid var(--border); border-radius:2px; padding:5px 12px;
      transition:color .2s,border-color .2s; white-space:nowrap; flex-shrink:0;
    }
    .back-btn:hover { color:var(--white); border-color:rgba(255,255,255,.3); }
    #topbar-center {
      position:absolute; left:50%; transform:translateX(-50%);
      font-family:'Cinzel Decorative',serif; font-size:.9rem; color:var(--white); pointer-events:none;
    }
    #topbar-right {
      margin-left:auto; display:flex; align-items:center; gap:10px; flex-shrink:0;
    }
    .tb-divider { width:1px; height:16px; background:var(--border); }

    /* topbar buttons */
    #btn-add-card {
      display:none;
      font-family:'Cinzel',serif; font-size:.54rem; letter-spacing:.1em;
      padding:5px 14px; border-radius:2px;
      border:1px solid rgba(245,197,24,.35); background:rgba(245,197,24,.07);
      color:#f5c518; cursor:pointer; white-space:nowrap; transition:background .2s;
    }
    #btn-add-card:hover { background:rgba(245,197,24,.16); }
    #topbar-username {
      font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.1em;
      color:var(--white); white-space:nowrap;
    }
    .role-badge {
      font-size:.52rem; font-family:'Cinzel',serif; letter-spacing:.08em;
      padding:2px 7px; border-radius:2px; font-weight:700;
      text-transform:uppercase; border:1px solid;
    }
    .role-creator    { color:#f5c518; border-color:rgba(245,197,24,.35);  background:rgba(245,197,24,.09); }
    .role-admin      { color:#e53935; border-color:rgba(229,57,53,.35);   background:rgba(229,57,53,.09); }
    .role-card_editor{ color:#90caf9; border-color:rgba(144,202,249,.35); background:rgba(144,202,249,.09); }
    .role-moderator  { color:#80cbc4; border-color:rgba(128,203,196,.35); background:rgba(128,203,196,.09); }
    .role-supporter  { color:#b0bec5; border-color:rgba(176,190,197,.35); background:rgba(176,190,197,.09); }
    .role-player     { color:#888;    border-color:rgba(130,130,130,.35); background:rgba(130,130,130,.09); }
    #btn-signin {
      font-family:'Cinzel',serif; font-size:.54rem; letter-spacing:.1em;
      padding:5px 12px; border-radius:2px;
      border:1px solid rgba(255,255,255,.15); background:transparent;
      color:var(--grey); cursor:pointer; transition:color .2s,border-color .2s;
    }
    #btn-signin:hover { color:var(--white); border-color:rgba(255,255,255,.3); }
    #btn-signout {
      display:none;
      font-family:'Cinzel',serif; font-size:.54rem; letter-spacing:.1em;
      padding:5px 12px; border-radius:2px;
      border:1px solid rgba(255,255,255,.1); background:transparent;
      color:#666; cursor:pointer; transition:color .2s,border-color .2s;
    }
    #btn-signout:hover { color:var(--white); border-color:rgba(255,255,255,.25); }

    /* ── LAYOUT ── */
    #page { display:flex; min-height:calc(100vh - 49px); }

    /* ── SIDEBAR ── */
    #sidebar {
      width:260px; flex-shrink:0;
      border-right:1px solid var(--border2); padding:20px 18px;
      display:flex; flex-direction:column; gap:18px;
      position:sticky; top:49px; height:calc(100vh - 49px); overflow-y:auto;
    }
    .sb-title {
      font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.22em;
      text-transform:uppercase; color:var(--grey-dim);
      padding-bottom:6px; border-bottom:1px solid var(--border2); margin-bottom:8px;
    }
    #search-input {
      width:100%; background:var(--surface); border:1px solid var(--border);
      border-radius:2px; padding:8px 12px; color:var(--white);
      font-family:'Crimson Pro',serif; font-size:.9rem; outline:none; transition:border-color .2s;
    }
    #search-input:focus { border-color:rgba(255,255,255,.3); }
    #search-input::placeholder { color:var(--grey-dim); }
    .f-label {
      font-family:'Cinzel',serif; font-size:.54rem; letter-spacing:.16em;
      text-transform:uppercase; color:var(--grey); margin-bottom:2px;
    }
    .f-select {
      width:100%; background:var(--surface); border:1px solid var(--border);
      border-radius:2px; padding:7px 10px; color:var(--white);
      font-family:'Crimson Pro',serif; font-size:.86rem; outline:none;
      transition:border-color .2s; cursor:pointer;
    }
    .f-select:focus { border-color:rgba(255,255,255,.3); }
    .f-select option { background:#111; }
    .sb-btn {
      width:100%; padding:8px; background:transparent; border:1px solid var(--border);
      border-radius:2px; color:var(--grey); font-family:'Cinzel',serif;
      font-size:.56rem; letter-spacing:.16em; text-transform:uppercase;
      cursor:pointer; transition:color .2s,border-color .2s,background .2s;
    }
    .sb-btn:hover { color:var(--white); border-color:rgba(255,255,255,.3); }
    .sb-btn.gold {
      border-color:rgba(245,197,24,.3); color:#888;
    }
    .sb-btn.gold:hover { color:#f5c518; border-color:rgba(245,197,24,.5); background:rgba(245,197,24,.06); }
    .sb-btn.gold.active {
      color:#f5c518; border-color:rgba(245,197,24,.5); background:rgba(245,197,24,.08);
    }

    /* ── MAIN ── */
    #main { flex:1; padding:20px 24px; display:flex; flex-direction:column; gap:14px; overflow:hidden; }
    #top-bar-row {
      display:flex; align-items:center; justify-content:space-between;
      font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.16em;
      text-transform:uppercase; color:var(--grey);
    }
    .sort-sel {
      background:var(--surface); border:1px solid var(--border); border-radius:2px;
      padding:5px 9px; color:var(--white); font-family:'Cinzel',serif;
      font-size:.56rem; letter-spacing:.08em; outline:none; cursor:pointer;
    }
    .sort-sel option { background:#111; }

    /* ── CARD GRID ── */
    #card-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px; overflow-y:auto; max-height:calc(100vh - 145px); padding-bottom:20px;
    }
    #card-grid::-webkit-scrollbar { width:4px; }
    #card-grid::-webkit-scrollbar-thumb { background:var(--grey-dim); border-radius:2px; }

    /* ── CARD TILE ── */
    .card-tile {
      background:var(--surface); border:1px solid var(--border2); border-radius:3px;
      overflow:hidden; cursor:pointer; position:relative;
      transition:border-color .2s,transform .15s;
      display:flex; flex-direction:column; animation:tileIn .3s ease both;
    }
    @keyframes tileIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .card-tile:hover { border-color:rgba(255,255,255,.22); transform:translateY(-2px); }
    .card-img-wrap {
      width:100%; aspect-ratio:3/4; background:var(--surface2);
      display:flex; align-items:center; justify-content:center;
      color:var(--grey-dim); font-size:.68rem; font-family:'Cinzel',serif; letter-spacing:.1em; text-align:center;
    }
    .card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .card-body { padding:10px 10px 8px; flex:1; display:flex; flex-direction:column; gap:4px; }
    .card-name { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.06em; color:var(--white); line-height:1.3; }
    .card-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-top:2px; }
    .badge-type {
      font-family:'Cinzel',serif; font-size:.46rem; letter-spacing:.1em;
      text-transform:uppercase; color:var(--grey); border:1px solid var(--border2); padding:1px 5px; border-radius:1px;
    }
    .badge-el {
      font-family:'Cinzel',serif; font-size:.46rem; letter-spacing:.08em;
      text-transform:uppercase; padding:1px 5px; border-radius:1px; border:1px solid; font-weight:700;
    }
    .el-solis{color:var(--solis);border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08);}
    .el-ignus{color:var(--ignus);border-color:rgba(255,87,34,.3);background:rgba(255,87,34,.08);}
    .el-silva{color:var(--silva);border-color:rgba(102,187,106,.3);background:rgba(102,187,106,.08);}
    .el-terra{color:var(--terra);border-color:rgba(161,136,127,.3);background:rgba(161,136,127,.08);}
    .el-luna{color:var(--luna);border-color:rgba(206,147,216,.3);background:rgba(206,147,216,.08);}
    .el-aqua{color:var(--aqua);border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.08);}
    .el-aes{color:var(--aes);border-color:rgba(144,164,174,.3);background:rgba(144,164,174,.08);}
    .el-void{color:var(--void);border-color:rgba(97,97,97,.3);background:rgba(97,97,97,.08);}
    .card-stats { display:flex; gap:8px; font-family:'Cinzel',serif; font-size:.5rem; color:var(--grey); margin-top:3px; }
    .card-stats span { color:var(--white); }
    .badge-rar {
      font-family:'Cinzel',serif; font-size:.44rem; letter-spacing:.1em;
      text-transform:uppercase; margin-top:auto; padding-top:5px;
    }
    .rar-common{color:var(--common);} .rar-uncommon{color:var(--uncommon);} .rar-rare{color:var(--rare);}
    .rar-super-rare{color:var(--super-rare);} .rar-ultra-rare{color:var(--ultra-rare);}
    .rar-secret-rare{color:var(--secret-rare);} .rar-hyper-rare{color:var(--hyper-rare);}
    .rar-repack{color:var(--repack);} .rar-promo{color:var(--promo);}

    /* edit overlay on card */
    .card-edit-overlay {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,.65);
      flex-direction:column; align-items:center; justify-content:center; gap:8px;
    }
    .edit-mode-active .card-tile:hover .card-edit-overlay { display:flex; }
    .eo-btn {
      font-family:'Cinzel',serif; font-size:.54rem; letter-spacing:.1em;
      padding:7px 18px; border-radius:2px; cursor:pointer; width:120px; text-align:center;
    }
    .eo-edit { border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.1); color:var(--white); }
    .eo-edit:hover { background:rgba(255,255,255,.2); }
    .eo-del  { border:1px solid rgba(229,57,53,.4); background:rgba(229,57,53,.1); color:var(--red); }
    .eo-del:hover  { background:rgba(229,57,53,.22); }

    /* empty state */
    .empty-msg {
      grid-column:1/-1; text-align:center; padding:60px 20px;
      color:var(--grey-dim); font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.16em; text-transform:uppercase;
    }

    /* ── DETAIL MODAL ── */
    #detail-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.88); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .25s;
    }
    #detail-overlay.open { opacity:1; pointer-events:all; }
    #detail-box {
      background:var(--surface); border:1px solid var(--border); border-radius:3px;
      width:600px; max-width:95vw; max-height:90vh; overflow-y:auto; position:relative;
      transform:translateY(14px) scale(.97); transition:transform .25s; display:flex;
    }
    #detail-overlay.open #detail-box { transform:none; }
    #detail-box::-webkit-scrollbar { width:3px; }
    #detail-box::-webkit-scrollbar-thumb { background:var(--grey-dim); }
    #detail-img {
      width:200px; flex-shrink:0; background:var(--surface2);
      display:flex; align-items:center; justify-content:center;
      color:var(--grey-dim); font-size:.6rem; font-family:'Cinzel',serif; text-align:center; padding:10px;
    }
    #detail-img img { width:100%; height:100%; object-fit:cover; }
    #detail-body { flex:1; padding:24px 20px; display:flex; flex-direction:column; gap:12px; }
    #detail-close {
      position:absolute; top:10px; right:12px; background:none; border:none;
      cursor:pointer; color:var(--grey-dim); font-size:1rem; transition:color .2s;
    }
    #detail-close:hover { color:var(--white); }
    .d-name { font-family:'Cinzel Decorative',serif; font-size:1.1rem; color:var(--white); line-height:1.2; }
    .d-badges { display:flex; gap:6px; flex-wrap:wrap; }
    .d-label { font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.2em; text-transform:uppercase; color:var(--grey-dim); margin-bottom:2px; }
    .d-text  { font-size:.88rem; color:var(--white); line-height:1.5; }
    .d-grid  { display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; }
    .d-field { display:flex; flex-direction:column; gap:2px; }
    .d-val   { font-family:'Cinzel',serif; font-size:.66rem; color:var(--white); }
    .d-del-btn {
      margin-top:auto; padding:9px; background:rgba(229,57,53,.07);
      border:1px solid rgba(229,57,53,.3); border-radius:2px;
      color:var(--red); font-family:'Cinzel',serif; font-size:.6rem;
      letter-spacing:.18em; text-transform:uppercase; cursor:pointer; transition:background .2s;
    }
    .d-del-btn:hover { background:rgba(229,57,53,.18); }

    /* ── ADD / EDIT CARD MODAL ── */
    #card-modal {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,.86); backdrop-filter:blur(4px);
      align-items:flex-start; justify-content:center;
      overflow-y:auto; padding:36px 20px;
    }
    #card-modal.open { display:flex; }
    #card-modal-box {
      background:var(--surface); border:1px solid var(--border); border-radius:4px;
      width:500px; max-width:100%; padding:28px 26px; position:relative; flex-shrink:0;
      display:flex; flex-direction:column; gap:10px;
    }
    #card-modal-title { font-family:'Cinzel Decorative',serif; font-size:.95rem; color:var(--white); text-align:center; margin-bottom:4px; }
    .cm-close { position:absolute; top:12px; right:14px; background:none; border:none; color:var(--grey); font-size:1rem; cursor:pointer; }
    .cm-close:hover { color:var(--white); }
    .field { display:flex; flex-direction:column; gap:4px; }
    .field label { font-family:'Cinzel',serif; font-size:.53rem; letter-spacing:.16em; text-transform:uppercase; color:var(--grey); }
    .field input,.field select,.field textarea {
      background:var(--surface2); border:1px solid var(--border); border-radius:2px;
      padding:7px 10px; color:var(--white); font-family:'Crimson Pro',serif;
      font-size:.88rem; outline:none; transition:border-color .2s; width:100%;
    }
    .field input:focus,.field select:focus,.field textarea:focus { border-color:rgba(255,255,255,.3); }
    .field select option { background:#111; }
    .field textarea { resize:vertical; min-height:58px; }
    .field input[type="number"] { -moz-appearance:textfield; }
    .field input[type="number"]::-webkit-inner-spin-button { opacity:.4; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .submit-btn {
      padding:10px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2);
      border-radius:2px; color:var(--white); font-family:'Cinzel',serif;
      font-size:.62rem; letter-spacing:.2em; text-transform:uppercase;
      cursor:pointer; transition:background .2s; margin-top:4px;
    }
    .submit-btn:hover { background:rgba(255,255,255,.14); }
    .submit-btn:disabled { opacity:.35; cursor:not-allowed; }
    .f-err { font-size:.7rem; color:var(--red); text-align:center; min-height:14px; }
    .f-ok  { font-size:.7rem; color:var(--green); text-align:center; min-height:14px; }

    /* ── AUTH MODAL ── */
    #auth-modal {
      display:none; position:fixed; inset:0; z-index:999;
      background:rgba(0,0,0,.86); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    #auth-modal.open { display:flex; }
    #auth-box {
      background:#111; border:1px solid rgba(255,255,255,.1); border-radius:4px;
      padding:30px; width:320px; display:flex; flex-direction:column; gap:14px;
    }
    #auth-title { font-family:'Cinzel Decorative',serif; font-size:.88rem; color:var(--white); text-align:center; }
    .auth-input {
      background:#0a0a0a; border:1px solid rgba(255,255,255,.1); border-radius:2px;
      padding:10px; color:var(--white); font-family:'Cinzel',serif; font-size:.7rem; outline:none; width:100%;
    }
    #auth-err { font-family:'Cinzel',serif; font-size:.56rem; color:var(--red); min-height:14px; }
    .auth-submit {
      font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.15em; padding:10px; border-radius:2px;
      border:1px solid rgba(245,197,24,.3); background:rgba(245,197,24,.08); color:#f5c518;
      cursor:pointer; text-transform:uppercase;
    }
    #auth-switch { text-align:center; font-family:'Cinzel',serif; font-size:.52rem; color:#555; cursor:pointer; }
    .auth-cancel { background:none; border:none; color:#444; font-size:.58rem; cursor:pointer; font-family:'Cinzel',serif; text-align:center; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(10px);
      background:var(--surface); border:1px solid var(--border); border-radius:2px;
      padding:8px 20px; font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.12em;
      color:var(--white); z-index:400; opacity:0;
      transition:opacity .25s,transform .25s; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── EFFECT BUILDER ── */
    .eb-block { background:#0d0d0d; border:1px solid var(--border2); border-radius:3px; padding:10px; }
    .eb-action { background:#111; border:1px solid var(--border2); border-radius:2px; padding:8px; }

    @media(max-width:700px){
      #sidebar{width:100%;position:static;height:auto;border-right:none;border-bottom:1px solid var(--border2);}
      #page{flex-direction:column;}
      #detail-box{flex-direction:column;}
      #detail-img{width:100%;height:180px;}
    }
  </style>
</head>
<body>

<!-- ══════════ TOPBAR ══════════ -->
<nav id="topbar">
  <a class="back-btn" href="index.html">← Back</a>
  <div id="topbar-center">Card Database</div>
  <div id="topbar-right">
    <!-- Add Card button — shown only for editors+ -->
    <button id="btn-add-card" onclick="openCardModal()">✏️ Add Card</button>
    <!-- divider -->
    <div class="tb-divider" id="tb-div-1" style="display:none;"></div>
    <!-- username -->
    <span id="topbar-username"></span>
    <!-- role badge -->
    <span id="topbar-badge" class="role-badge" style="display:none;"></span>
    <!-- divider -->
    <div class="tb-divider" id="tb-div-2" style="display:none;"></div>
    <!-- sign in (logged out) -->
    <button id="btn-signin" onclick="openAuthModal()">Sign In</button>
    <!-- sign out (logged in) -->
    <button id="btn-signout" onclick="doSignOut()">Sign Out</button>
  </div>
</nav>

<!-- ══════════ AUTH MODAL ══════════ -->
<div id="auth-modal">
  <div id="auth-box">
    <div id="auth-title">Sign In</div>
    <input id="auth-email" class="auth-input" type="email" placeholder="Email"/>
    <input id="auth-password" class="auth-input" type="password" placeholder="Password"/>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:.52rem;color:#666;">
      <input type="checkbox" id="auth-remember" checked style="accent-color:#f5c518;"/> Remember me
    </label>
    <div id="auth-err"></div>
    <button class="auth-submit" onclick="submitAuth()">Sign In</button>
    <div id="auth-switch" onclick="toggleAuthMode()">Don't have an account? Register</div>
    <button class="auth-cancel" onclick="closeAuthModal()">Cancel</button>
  </div>
</div>

<!-- ══════════ PAGE ══════════ -->
<div id="page">

  <!-- SIDEBAR -->
  <aside id="sidebar">

    <!-- Search -->
    <div>
      <div class="sb-title">Search</div>
      <input id="search-input" type="text" placeholder="Search cards…" oninput="applyFilters()"/>
    </div>

    <!-- Filters -->
    <div>
      <div class="sb-title">Filters</div>

<!-- ══════════ SCRIPT ══════════ -->
<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SB_URL  = 'https://bcqgrxzhjawxqwceflpk.supabase.co';
const SB_ANON = 'sb_publishable_dhuEDL-DJP4_mD4PUVIevg_1u_gjA-j';
const sb = supabase.createClient(SB_URL, SB_ANON);

// ── Constants ─────────────────────────────────────────────────────────────────
const ROLE_LABELS = {
  creator:'👑 Creator', admin:'🛡 Admin', card_editor:'✏️ Editor',
  moderator:'🔰 Mod', supporter:'💎 Supporter', player:'Player',
};
const CAN_ADD    = ['creator','admin','card_editor'];
const CAN_DELETE = ['creator','admin','moderator'];
const RARITY_ORDER = ['common','uncommon','rare','super rare','ultra rare','secret rare','hyper rare','repack','promo'];

// ── State ─────────────────────────────────────────────────────────────────────
let currentUser    = null;
let currentProfile = null;
let allCards       = [];
let activeCard     = null;   // card open in detail or edit modal
let editingCard    = false;  // true = modal is in edit mode
let editModeOn     = false;  // grid edit overlay mode

// ── Helpers ───────────────────────────────────────────────────────────────────
function role()     { return currentProfile?.role || null; }
function can(list)  { return Array.isArray(list) && list.includes(role()); }
function esc(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rarCls(r)  { return 'rar-' + (r||'').replace(/ /g,'-'); }

let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Auth UI ───────────────────────────────────────────────────────────────────
function refreshAuthUI() {
  const elName    = document.getElementById('topbar-username');
  const elBadge   = document.getElementById('topbar-badge');
  const elAddBtn  = document.getElementById('btn-add-card');
  const elSignIn  = document.getElementById('btn-signin');
  const elSignOut = document.getElementById('btn-signout');
  const elDiv1    = document.getElementById('tb-div-1');
  const elDiv2    = document.getElementById('tb-div-2');
  const elManage  = document.getElementById('manage-section');

  if (currentProfile) {
    // ── logged in with profile ──
    const displayName = currentProfile.username || currentUser?.email || '';
    const r           = currentProfile.role;

    elName.textContent    = displayName;
    elBadge.textContent   = ROLE_LABELS[r] || r;
    elBadge.className     = `role-badge role-${r}`;
    elBadge.style.display = '';

    elDiv1.style.display    = '';
    elDiv2.style.display    = '';
    elSignIn.style.display  = 'none';
    elSignOut.style.display = '';

    // Add Card in topbar — only for editors+
    elAddBtn.style.display = can(CAN_ADD) ? '' : 'none';

    // Card Management sidebar section
    elManage.style.display = (can(CAN_ADD) || can(CAN_DELETE)) ? '' : 'none';

  } else if (currentUser) {
    // ── logged in but profile not yet loaded ──
    elName.textContent      = currentUser.email;
    elBadge.style.display   = 'none';
    elDiv1.style.display    = '';
    elDiv2.style.display    = '';
    elSignIn.style.display  = 'none';
    elSignOut.style.display = '';
    elAddBtn.style.display  = 'none';
    elManage.style.display  = 'none';

  } else {
    // ── logged out ──
    elName.textContent      = '';
    elBadge.style.display   = 'none';
    elDiv1.style.display    = 'none';
    elDiv2.style.display    = 'none';
    elSignIn.style.display  = '';
    elSignOut.style.display = 'none';
    elAddBtn.style.display  = 'none';
    elManage.style.display  = 'none';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function loadProfile(userId) {
  const { data, error } = await sb.from('profiles').select('*').eq('id', userId).single();
  if (error) console.warn('[profile]', error.message);
  return data || null;
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    currentUser    = session.user;
    currentProfile = await loadProfile(session.user.id);
  }
  refreshAuthUI();
  await loadCards();
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_OUT') {
    currentUser = null; currentProfile = null;
    refreshAuthUI(); return;
  }
  if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session?.user) {
    currentUser    = session.user;
    currentProfile = await loadProfile(session.user.id);
    refreshAuthUI();
    if (allCards.length === 0) await loadCards();
  }
});

// ── Load & render cards ───────────────────────────────────────────────────────
async function loadCards() {
  document.getElementById('card-grid').innerHTML = '<div class="empty-msg">Loading cards…</div>';
  const { data, error } = await sb.from('cards').select('*');
  if (error) {
    document.getElementById('card-grid').innerHTML = `<div class="empty-msg">Error: ${esc(error.message)}</div>`;
    return;
  }
  allCards = data || [];
  applyFilters();
}

function applyFilters() {
  const q       = document.getElementById('search-input').value.toLowerCase().trim();
  const element = document.getElementById('f-element').value;
  const type    = document.getElementById('f-type').value;
  const rarity  = document.getElementById('f-rarity').value;
  const set     = document.getElementById('f-set').value;
  const aether  = document.getElementById('f-aether').value;
  const sortBy  = document.getElementById('sort-by').value;
  const sortDir = document.getElementById('sort-dir').value;

  let list = allCards.filter(c => {
    if (q && !c.name.toLowerCase().includes(q) && !(c.description||'').toLowerCase().includes(q)) return false;
    if (element && c.element !== element) return false;
    if (type    && c.card_type !== type)  return false;
    if (rarity  && c.rarity !== rarity)   return false;
    if (set     && c.card_set !== set)    return false;
    if (aether  && c.aether_cost > parseInt(aether)) return false;
    return true;
  });

  list.sort((a, b) => {
    let va = a[sortBy], vb = b[sortBy];
    if (sortBy === 'rarity') { va = RARITY_ORDER.indexOf(va); vb = RARITY_ORDER.indexOf(vb); }
    if (va == null) va = sortDir === 'asc' ?  Infinity : -Infinity;
    if (vb == null) vb = sortDir === 'asc' ?  Infinity : -Infinity;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return va < vb ? (sortDir==='asc'?-1:1) : va > vb ? (sortDir==='asc'?1:-1) : 0;
  });

  renderGrid(list);
}

function resetFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('f-element').value = '';
  document.getElementById('f-type').value    = '';
  document.getElementById('f-rarity').value  = '';
  document.getElementById('f-set').value     = '';
  document.getElementById('f-aether').value  = '';
  document.getElementById('sort-by').value   = 'name';
  document.getElementById('sort-dir').value  = 'asc';
  applyFilters();
}

function renderGrid(cards) {
  document.getElementById('count-label').textContent = `${cards.length} card${cards.length!==1?'s':''} found`;
  const grid = document.getElementById('card-grid');
  if (!cards.length) { grid.innerHTML = '<div class="empty-msg">No cards match your filters.</div>'; return; }

  const showOverlay = can(CAN_ADD) || can(CAN_DELETE);

  grid.innerHTML = cards.map((c, i) => `
    <div class="card-tile" data-id="${c.id}" style="animation-delay:${i*.03}s" onclick="tileClicked(event,${c.id})">
      <div class="card-img-wrap">
        ${c.image_url
          ? `<img src="${esc(c.image_url)}" alt="${esc(c.name)}" loading="lazy"
               onerror="this.parentElement.innerHTML='No Image'"/>`
          : 'No Image'}
      </div>
      <div class="card-body">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-meta">
          <span class="badge-type">${esc(c.card_type)}</span>
          ${c.card_set === 'legacy'
            ? `<span class="badge-type" style="color:#f5c518;border-color:rgba(245,197,24,.3);">Legacy</span>`
            : c.card_set === 'modern'
              ? `<span class="badge-type" style="color:#4fc3f7;border-color:rgba(79,195,247,.3);">Modern</span>` : ''}
          <span class="badge-el el-${c.element}">${c.element}</span>
        </div>
        ${(c.atk!=null||c.def!=null) ? `
          <div class="card-stats">
            ${c.atk!=null?`ATK <span>${c.atk}</span>`:''}
            ${c.def!=null?`DEF <span>${c.def}</span>`:''}
            ${c.aether_cost!=null?`✦ <span>${c.aether_cost}</span>`:''}
          </div>` : ''}
        <div class="badge-rar ${rarCls(c.rarity)}">${c.rarity}</div>
      </div>
      ${showOverlay ? `
        <div class="card-edit-overlay">
          ${can(CAN_ADD)    ? `<button class="eo-btn eo-edit" onclick="event.stopPropagation();openEditCard(${c.id})">✏️ Edit</button>` : ''}
          ${can(CAN_DELETE) ? `<button class="eo-btn eo-del"  onclick="event.stopPropagation();confirmDeleteCard(${c.id})">🗑 Delete</button>` : ''}
        </div>` : ''}
    </div>`).join('');
}

// tile click: open detail unless edit mode is on (then overlay handles it)
function tileClicked(e, id) {
  if (editModeOn) return;
  openDetail(id);
}

// ── Edit mode toggle ──────────────────────────────────────────────────────────
function toggleEditMode() {
  editModeOn = !editModeOn;
  const grid = document.getElementById('card-grid');
  const btn  = document.getElementById('btn-edit-mode');
  const hint = document.getElementById('edit-mode-hint');
  if (editModeOn) {
    grid.classList.add('edit-mode-active');
    btn.classList.add('active');
    btn.textContent = '✏️ Edit Mode: ON';
    hint.style.display = '';
  } else {
    grid.classList.remove('edit-mode-active');
    btn.classList.remove('active');
    btn.textContent = '✏️ Enable Edit Mode';
    hint.style.display = 'none';
  }
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function openDetail(id) {
  const c = allCards.find(x => x.id === id);
  if (!c) return;
  activeCard = c;

  const imgEl = document.getElementById('detail-img');
  imgEl.innerHTML = c.image_url
    ? `<img src="${esc(c.image_url)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.textContent='No Image'"/>`
    : 'No Image';

  document.getElementById('d-name').textContent = c.name;
  document.getElementById('d-badges').innerHTML = `
    <span class="badge-el el-${c.element}">${c.element}</span>
    <span class="badge-type">${esc(c.card_type)}</span>
    <span class="badge-rar ${rarCls(c.rarity)}">${c.rarity}</span>
    ${c.aether_cost!=null?`<span class="badge-type">✦ ${c.aether_cost} Aether</span>`:''}`;

  const dw = document.getElementById('d-desc-wrap');
  document.getElementById('d-desc').textContent = c.description || '';
  dw.style.display = c.description ? '' : 'none';

  const aw = document.getElementById('d-abil-wrap');
  document.getElementById('d-abil').textContent = c.special_ability || '';
  aw.style.display = c.special_ability ? '' : 'none';

  document.getElementById('d-grid').innerHTML = [
    ['ATK', c.atk!=null?c.atk:'—'],
    ['DEF', c.def!=null?c.def:'—'],
    ['Race / Trait', c.race_trait||'—'],
    ['Artist', c.artist||'—'],
  ].map(([l,v]) => `
    <div class="d-field">
      <div class="d-label">${l}</div>
      <div class="d-val">${esc(String(v))}</div>
    </div>`).join('');

  document.getElementById('d-del-btn').style.display = can(CAN_DELETE) ? '' : 'none';
  document.getElementById('detail-overlay').classList.add('open');
}

function maybeCloseDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
}
function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  activeCard = null;
}

async function deleteCurrentCard() {
  if (!activeCard) return;
  if (!confirm(`Delete "${activeCard.name}"? This cannot be undone.`)) return;
  const { error } = await sb.from('cards').delete().eq('id', activeCard.id);
  if (error) { toast('Error: ' + error.message); return; }
  const name = activeCard.name;
  allCards = allCards.filter(c => c.id !== activeCard.id);
  closeDetail();
  applyFilters();
  toast(`"${name}" removed.`);
}

async function confirmDeleteCard(id) {
  const c = allCards.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`Delete "${c.name}"? This cannot be undone.`)) return;
  const { error } = await sb.from('cards').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  allCards = allCards.filter(x => x.id !== id);
  applyFilters();
  toast(`"${c.name}" removed.`);
}

// ── Add / Edit card modal ─────────────────────────────────────────────────────
function openCardModal() {
  if (!can(CAN_ADD)) {
    toast('You do not have permission to add cards.');
    return;
  }
  editingCard = false;
  activeCard  = null;
  resetCardForm();
  document.getElementById('card-modal-title').textContent = '✦ Add Card';
  document.getElementById('card-submit-btn').textContent  = '+ Add Card';
  document.getElementById('card-modal').classList.add('open');
}

function openEditCard(id) {
  if (!can(CAN_ADD)) { toast('No permission.'); return; }
  const c = allCards.find(x => x.id === id);
  if (!c) return;
  editingCard = true;
  activeCard  = c;
  // Pre-fill form
  document.getElementById('c-name').value    = c.name || '';
  document.getElementById('c-element').value = c.element || 'void';
  document.getElementById('c-type').value    = c.card_type || 'caster';
  document.getElementById('c-rarity').value  = c.rarity || 'common';
  document.getElementById('c-set').value     = c.card_set || 'modern';
  document.getElementById('c-atk').value     = c.atk != null ? c.atk : '';
  document.getElementById('c-def').value     = c.def != null ? c.def : '';
  document.getElementById('c-aether').value  = c.aether_cost != null ? c.aether_cost : '';
  document.getElementById('c-race').value    = c.race_trait || '';
  document.getElementById('c-artist').value  = c.artist || '';
  document.getElementById('c-desc-input').value = c.description || '';
  document.getElementById('c-ability').value = c.special_ability || '';
  document.getElementById('c-img').value     = c.image_url || '';
  document.getElementById('c-has-break').checked = !!c.has_break;
  document.getElementById('c-break-type').style.display = c.has_break ? '' : 'none';
  if (c.has_break && c.break_type) document.getElementById('c-break-type').value = c.break_type;
  document.getElementById('card-err').textContent = '';
  document.getElementById('card-ok').textContent  = '';
  document.getElementById('card-modal-title').textContent = '✦ Edit Card';
  document.getElementById('card-submit-btn').textContent  = 'Save Changes';
  document.getElementById('card-modal').classList.add('open');
}

function closeCardModal() {
  document.getElementById('card-modal').classList.remove('open');
  editingCard = false;
  activeCard  = null;
  resetCardForm();
}
function maybeCloseCardModal(e) {
  if (e.target === document.getElementById('card-modal')) closeCardModal();
}

function resetCardForm() {
  ['c-name','c-atk','c-def','c-aether','c-race','c-artist','c-desc-input','c-ability','c-img']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('card-err').textContent = '';
  document.getElementById('card-ok').textContent  = '';
  document.getElementById('c-has-break').checked = false;
  document.getElementById('c-break-type').style.display = 'none';
  effectBlocks = []; blockCounter = 0; renderEffectBlocks();
  document.getElementById('card-modal-title').textContent = '✦ Add Card';
  document.getElementById('card-submit-btn').textContent  = '+ Add Card';
}

async function submitCard() {
  const name   = document.getElementById('c-name').value.trim();
  const errEl  = document.getElementById('card-err');
  const okEl   = document.getElementById('card-ok');
  const btnEl  = document.getElementById('card-submit-btn');
  errEl.textContent = ''; okEl.textContent = '';
  if (!name) { errEl.textContent = 'Card name is required.'; return; }

  const payload = {
    name,
    element:         document.getElementById('c-element').value,
    card_type:       document.getElementById('c-type').value,
    rarity:          document.getElementById('c-rarity').value,
    card_set:        document.getElementById('c-set').value || 'modern',
    atk:             document.getElementById('c-atk').value    !== '' ? parseInt(document.getElementById('c-atk').value)    : null,
    def:             document.getElementById('c-def').value    !== '' ? parseInt(document.getElementById('c-def').value)    : null,
    aether_cost:     document.getElementById('c-aether').value !== '' ? parseInt(document.getElementById('c-aether').value) : 0,
    race_trait:      document.getElementById('c-race').value.trim()   || null,
    artist:          document.getElementById('c-artist').value.trim() || null,
    description:     document.getElementById('c-desc-input').value.trim() || null,
    special_ability: document.getElementById('c-ability').value.trim() || null,
    image_url:       document.getElementById('c-img').value.trim()    || null,
    has_break:       document.getElementById('c-has-break').checked,
    break_type:      document.getElementById('c-has-break').checked ? document.getElementById('c-break-type').value : null,
    effect_data:     buildEffectData(),
  };

  btnEl.disabled = true;
  btnEl.textContent = editingCard ? 'Saving…' : 'Adding…';

  let data, error;
  if (editingCard && activeCard) {
    ({ data, error } = await sb.from('cards').update(payload).eq('id', activeCard.id).select().single());
  } else {
    payload.added_by = currentUser?.id;
    ({ data, error } = await sb.from('cards').insert(payload).select().single());
  }

  btnEl.disabled = false;
  btnEl.textContent = editingCard ? 'Save Changes' : '+ Add Card';

  if (error) { errEl.textContent = error.message; return; }

  if (editingCard) {
    const idx = allCards.findIndex(x => x.id === data.id);
    if (idx > -1) allCards[idx] = data; else allCards.unshift(data);
    okEl.textContent = `✓ "${name}" updated!`;
    setTimeout(() => { okEl.textContent = ''; closeCardModal(); }, 1500);
  } else {
    allCards.unshift(data);
    okEl.textContent = `✓ "${name}" added!`;
    // clear name/stats only, keep type/element for rapid entry
    ['c-name','c-atk','c-def','c-aether','c-race','c-artist','c-desc-input','c-ability','c-img']
      .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('c-has-break').checked = false;
    document.getElementById('c-break-type').style.display = 'none';
    effectBlocks = []; blockCounter = 0; renderEffectBlocks();
    document.getElementById('c-name').focus();
    setTimeout(() => { okEl.textContent = ''; }, 3500);
  }
  applyFilters();
}

// ── Auth modal ────────────────────────────────────────────────────────────────
let authMode = 'signin';

function openAuthModal() {
  authMode = 'signin';
  document.getElementById('auth-title').textContent       = 'Sign In';
  document.getElementById('auth-switch').textContent      = "Don't have an account? Register";
  document.querySelector('#auth-box .auth-submit').textContent = 'Sign In';
  document.getElementById('auth-err').textContent         = '';
  document.getElementById('auth-modal').classList.add('open');
}
function closeAuthModal() { document.getElementById('auth-modal').classList.remove('open'); }
function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'register' : 'signin';
  document.getElementById('auth-title').textContent  = authMode === 'signin' ? 'Sign In' : 'Register';
  document.getElementById('auth-switch').textContent = authMode === 'signin' ? "Don't have an account? Register" : 'Already have an account? Sign In';
  document.querySelector('#auth-box .auth-submit').textContent = authMode === 'signin' ? 'Sign In' : 'Register';
  document.getElementById('auth-err').textContent = '';
}
async function submitAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const pass     = document.getElementById('auth-password').value;
  const remember = document.getElementById('auth-remember').checked;
  const errEl    = document.getElementById('auth-err');
  if (!email || !pass) { errEl.textContent = 'Email and password required.'; return; }
  let result;
  if (authMode === 'signin') {
    result = await sb.auth.signInWithPassword({ email, password: pass, options: { persistSession: remember } });
  } else {
    result = await sb.auth.signUp({ email, password: pass });
  }
  if (result.error) { errEl.textContent = result.error.message; return; }
  closeAuthModal();
}
async function doSignOut() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  // turn off edit mode if on
  if (editModeOn) toggleEditMode();
  refreshAuthUI();
}

// ── Effect builder ────────────────────────────────────────────────────────────
const TRIGGERS = {
  on_play:'When Played', on_attack:'When This Attacks', on_destroy:'When This Is Destroyed',
  on_break:'When This Breaks an Orb', turn_start:'Start of Your Turn', turn_end:'End of Your Turn',
  on_orb_broken:'When Your Orb Is Broken', on_opponent_play:'When Opponent Plays a Card',
  on_damage:'When This Takes Damage', continuous:'Continuous (Always Active)',
};
const ACTIONS = {
  draw:'Draw Cards', destroy:'Destroy Servant', boost:'Boost ATK/DEF', negate:'Negate Effect/Attack',
  search:'Search Deck', return:'Return to Hand', banish:'Banish', extra_attack:'Grant Extra Attack',
  protect:'Protect from Destruction', gain_aether:'Gain Aether', copy_effect:'Copy Effect',
  buff_element:'Buff All of Element', direct_orb:'Direct Orb Damage',
  change_position:'Change Servant Position', special:'Custom / Manual Effect',
};
const TARGETS = {
  self:'This Card', selected_opponent_servant:'Selected Opponent Servant',
  all_opponent_servants:'All Opponent Servants', selected_friendly:'Selected Friendly Servant',
  all_friendly:'All Friendly Servants', current_effect:'Current Effect',
  current_attack:'Current Attack', selected_field_servant:'Any Field Servant',
};

let effectBlocks = [], blockCounter = 0;

function toggleBreakSel() {
  document.getElementById('c-break-type').style.display =
    document.getElementById('c-has-break').checked ? '' : 'none';
}
function addEffectBlock() {
  effectBlocks.push({ id: blockCounter++, trigger:'on_play', actions:[] });
  renderEffectBlocks();
}
function removeEffectBlock(id) { effectBlocks = effectBlocks.filter(b=>b.id!==id); renderEffectBlocks(); }
function addAction(bid) { const b=effectBlocks.find(b=>b.id===bid); if(b){b.actions.push(defAction('draw'));renderEffectBlocks();} }
function removeAction(bid,ai) { const b=effectBlocks.find(b=>b.id===bid); if(b){b.actions.splice(ai,1);renderEffectBlocks();} }
function setTrigger(bid,v)  { const b=effectBlocks.find(b=>b.id===bid); if(b) b.trigger=v; }
function setActionType(bid,ai,v) { const b=effectBlocks.find(b=>b.id===bid); if(b){b.actions[ai]=defAction(v);renderEffectBlocks();} }
function setActionField(bid,ai,f,v) {
  const b=effectBlocks.find(b=>b.id===bid); if(!b) return;
  b.actions[ai][f]=['amount','atk','def'].includes(f)?(v===''?0:parseInt(v)):v;
}
function defAction(t) {
  const m={
    draw:{type:'draw',amount:1}, destroy:{type:'destroy',target:'selected_opponent_servant'},
    boost:{type:'boost',target:'self',atk:300,def:0}, negate:{type:'negate',target:'current_attack'},
    search:{type:'search',filter:{card_type:'servant'}}, return:{type:'return',target:'selected_opponent_servant'},
    banish:{type:'banish',target:'selected_opponent_servant'}, extra_attack:{type:'extra_attack',amount:1},
    protect:{type:'protect',duration:'until_end_of_turn'}, gain_aether:{type:'gain_aether',amount:2},
    copy_effect:{type:'copy_effect',target:'selected_field_servant'},
    buff_element:{type:'buff_element',element:'ignus',atk:200,def:0},
    direct_orb:{type:'direct_orb',amount:1},
    change_position:{type:'change_position',target:'selected_opponent_servant',position:'defense'},
    special:{type:'special',id:'',description:''},
  };
  return m[t]||{type:t};
}
function actionFields(b,a,ai) {
  const sel=(f,opts,v)=>`<select onchange="setActionField(${b.id},${ai},'${f}',this.value)" style="margin-top:3px;width:100%;background:#111;border:1px solid var(--border2);color:var(--white);padding:3px 5px;border-radius:2px;font-size:.58rem;">${opts.map(([ov,ol])=>`<option value="${ov}"${v===ov?' selected':''}>${ol}</option>`).join('')}</select>`;
  const inp=(f,v,tp='text',ph='')=>`<input type="${tp}" value="${v??''}" placeholder="${ph}" onchange="setActionField(${b.id},${ai},'${f}',this.value)" style="margin-top:3px;width:100%;background:#111;border:1px solid var(--border2);color:var(--white);padding:3px 5px;border-radius:2px;font-size:.58rem;"/>`;
  switch(a.type){
    case 'draw':case 'gain_aether':case 'extra_attack':case 'direct_orb': return `Amount: ${inp('amount',a.amount,'number')}`;
    case 'destroy':case 'return':case 'banish':case 'copy_effect': return `Target: ${sel('target',Object.entries(TARGETS),a.target)}`;
    case 'negate': return `Target: ${sel('target',[['current_attack','Current Attack'],['current_effect','Current Effect']],a.target)}`;
    case 'boost':  return `Target: ${sel('target',Object.entries(TARGETS),a.target)}<br>ATK+ ${inp('atk',a.atk,'number')} DEF+ ${inp('def',a.def,'number')}`;
    case 'protect': return `Duration: ${sel('duration',[['until_end_of_turn','Until End of Turn'],['permanent','Permanent']],a.duration)}`;
    case 'change_position': return `Target: ${sel('target',Object.entries(TARGETS),a.target)}<br>Pos: ${sel('position',[['attack','Attack'],['defense','Defense']],a.position)}`;
    case 'buff_element': return `Elem: ${sel('element',[['solis','Solis'],['ignus','Ignus'],['silva','Silva'],['terra','Terra'],['luna','Luna'],['aqua','Aqua'],['aes','Aes'],['void','Void']],a.element)}<br>ATK+ ${inp('atk',a.atk,'number')} DEF+ ${inp('def',a.def,'number')}`;
    case 'search': return `Type: ${sel('filter',Object.entries({servant:'Servant',caster:'Caster',conjure:'Conjure',barrier:'Barrier',deity:'Deity'}),a.filter?.card_type||'servant')}`;
    case 'special': return `ID: ${inp('id',a.id,'text','unique_id')}<br>Desc: ${inp('description',a.description,'text','What happens…')}`;
    default: return '';
  }
}
function renderEffectBlocks() {
  const el = document.getElementById('effect-blocks');
  if (!effectBlocks.length) {
    el.innerHTML = '<div style="font-size:.58rem;color:var(--grey-dim);font-family:\'Cinzel\',serif;letter-spacing:.08em;">No effects — click + Effect to add one</div>';
    updateEffectPreview(); return;
  }
  el.innerHTML = effectBlocks.map(b => `
    <div class="eb-block">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <select onchange="setTrigger(${b.id},this.value)" style="flex:1;background:#111;border:1px solid var(--border);color:var(--white);padding:4px 8px;border-radius:2px;font-family:'Cinzel',serif;font-size:.58rem;">
          ${Object.entries(TRIGGERS).map(([v,l])=>`<option value="${v}"${b.trigger===v?' selected':''}>${l}</option>`).join('')}
        </select>
        <button onclick="removeEffectBlock(${b.id})" style="background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.3);color:var(--red);padding:3px 8px;border-radius:2px;cursor:pointer;font-size:.58rem;">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${b.actions.map((a,ai)=>`
          <div class="eb-action">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <select onchange="setActionType(${b.id},${ai},this.value)" style="flex:1;background:#0a0a0a;border:1px solid var(--border2);color:var(--white);padding:3px 6px;border-radius:2px;font-size:.58rem;">
                ${Object.entries(ACTIONS).map(([v,l])=>`<option value="${v}"${a.type===v?' selected':''}>${l}</option>`).join('')}
              </select>
              <button onclick="removeAction(${b.id},${ai})" style="background:none;border:none;color:var(--grey);cursor:pointer;font-size:.8rem;">✕</button>
            </div>
            <div style="font-size:.56rem;color:var(--grey);">${actionFields(b,a,ai)}</div>
          </div>`).join('')}
        <button onclick="addAction(${b.id})" style="font-size:.56rem;padding:4px;background:rgba(255,255,255,.04);border:1px dashed var(--border2);border-radius:2px;color:var(--grey);cursor:pointer;font-family:'Cinzel',serif;">+ Add Action</button>
      </div>
    </div>`).join('');
  updateEffectPreview();
}
function buildEffectData() {
  if (!effectBlocks.length) return null;
  return { effects: effectBlocks.map(b => ({ trigger:b.trigger, actions:b.actions })) };
}
function toggleEffectPreview() {
  const el = document.getElementById('effect-preview');
  el.style.display = el.style.display === 'none' ? '' : 'none';
  updateEffectPreview();
}
function updateEffectPreview() {
  const el = document.getElementById('effect-preview');
  if (el.style.display !== 'none') el.textContent = JSON.stringify(buildEffectData(), null, 2);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeCardModal(); closeAuthModal(); }
  if (e.key === 'Enter' && document.getElementById('card-modal').classList.contains('open')) {
    if (!['TEXTAREA','SELECT'].includes(document.activeElement.tagName)) submitCard();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
renderEffectBlocks();
init();
</script>
