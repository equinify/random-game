<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Database — Caster Chronicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080808;--surface:#111;--white:#f0f0f0;--grey:#888;--grey-dim:#444;--border:rgba(255,255,255,0.1);--red:#e53935;--green:#4caf50}
    html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Crimson Pro',serif}
    
    #topbar{position:sticky;top:0;z-index:50;background:rgba(8,8,8,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);display:flex;align-items:center;padding:0 24px;height:49px;gap:8px}
    .back-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);text-decoration:none;border:1px solid var(--border);border-radius:2px;padding:5px 12px;transition:all .2s;white-space:nowrap}
    .back-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3)}
    .topbar-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--white);position:absolute;left:50%;transform:translateX(-50%);pointer-events:none}
    #topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .topbar-divider{width:1px;height:16px;background:var(--border)}
    .topbar-btn{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.1em;padding:5px 12px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--grey);cursor:pointer;transition:all .2s;display:none}
    .topbar-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3)}
    #add-btn{border-color:rgba(245,197,24,.3);color:#f5c518}
    #add-btn:hover{background:rgba(245,197,24,.1)}
    .topbar-info{display:flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:.55rem;display:none}
    #username{color:var(--white);white-space:nowrap}
    .role-badge{font-size:.55rem;letter-spacing:.08em;padding:2px 7px;border-radius:2px;font-weight:700;text-transform:uppercase;border:1px solid}
    .role-creator{color:#f5c518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08)}
    .role-card_editor{color:#90caf9;border-color:rgba(144,202,249,.3);background:rgba(144,202,249,.08)}
    
    #page{display:flex;min-height:calc(100vh - 49px)}
    #sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 18px;display:flex;flex-direction:column;gap:20px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto}
    .sidebar-section-title{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--grey-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    #search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:8px 12px;color:var(--white);font-family:'Crimson Pro',serif;font-size:.9rem;outline:none;transition:border-color .2s}
    #search:focus{border-color:rgba(255,255,255,.3)}
    .filter-group{display:flex;flex-direction:column;gap:6px;margin-bottom:15px}
    .filter-label{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey);margin-bottom:2px}
    .filter-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:7px 10px;color:var(--white);font-family:'Crimson Pro',serif;font-size:.88rem;outline:none;transition:border-color .2s;cursor:pointer}
    .filter-select:focus{border-color:rgba(255,255,255,.3)}
    .filter-select option{background:#111}
    .filter-multi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:7px 10px;color:var(--white);font-family:'Crimson Pro',serif;font-size:.88rem;outline:none;height:80px}
    .filter-multi option{background:#111;padding:2px}
    .reset-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--grey);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .reset-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3)}
    
    #main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow:hidden}
    #controls{display:flex;align-items:center;gap:12px;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey)}
    #count{flex-shrink:0}
    .sort-btn{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.1em;padding:5px 12px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--grey);cursor:pointer;transition:all .2s;flex-shrink:0}
    .sort-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3)}
    
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;overflow-y:auto;max-height:calc(100vh - 140px);padding-bottom:20px}
    .card{background:var(--surface);border:1px solid #222;border-radius:3px;overflow:hidden;cursor:pointer;transition:all .15s;display:flex;flex-direction:column}
    .card:hover{border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
    .card-img{width:100%;aspect-ratio:3/4;background:#000;overflow:hidden}
    .card-img img{width:100%;height:100%;object-fit:cover}
    .card-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px}
    .card-name{font-family:'Cinzel',serif;font-size:.7rem;color:var(--white)}
    .card-meta{color:var(--grey);font-size:.65rem}
    .card-rarity{font-size:.6rem;color:var(--grey);margin-top:auto}
    .edit-card-btn{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;padding:6px 10px;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);border-radius:2px;color:#f5c518;cursor:pointer;margin-top:8px;transition:all .2s;width:100%;text-transform:uppercase}
    .edit-card-btn:hover{background:rgba(245,197,24,.2);border-color:rgba(245,197,24,.5)}
    #empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--grey-dim);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;display:none}
    
    .modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);overflow-y:auto;padding:40px 20px}
    .modal.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:3px;width:500px;max-width:100%;padding:28px;position:relative;flex-shrink:0}
    .modal-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--white);margin-bottom:16px;text-align:center}
    .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--grey);font-size:1rem;cursor:pointer}
    .modal-close:hover{color:var(--white)}
    .field{margin-bottom:12px}
    .field label{display:block;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-bottom:5px}
    .field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:8px;color:var(--white);font-family:'Crimson Pro',serif;font-size:.88rem;outline:none;transition:border-color .2s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,255,255,.3)}
    .field select option,.field textarea option{background:#111}
    .field textarea{resize:vertical;min-height:60px}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .submit-btn{width:100%;padding:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:2px;color:var(--white);font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px}
    .submit-btn:hover{background:rgba(255,255,255,.14)}
    .submit-btn:disabled{opacity:.35;cursor:not-allowed}
    .msg{font-size:.7rem;text-align:center;min-height:14px;margin-top:8px;font-family:'Cinzel',serif}
    .msg.err{color:var(--red)}
    .msg.ok{color:var(--green)}
    
    .detail-img{width:100%;aspect-ratio:3/4;background:#000;margin-bottom:16px;border-radius:2px;overflow:hidden}
    .detail-img img{width:100%;height:100%;object-fit:cover}
    .detail-section{margin-bottom:12px}
    .detail-section-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--grey-dim);margin-bottom:3px}
    .detail-text{font-size:.9rem;color:var(--white);line-height:1.4}
    .detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .detail-stat{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:.75rem}
    .detail-stat-val{color:var(--white)}
  </style>
</head>
<body>

<div id="topbar">
  <a class="back-btn" href="index.html">← Back</a>
  <div class="topbar-title">Card Database</div>
  <div id="topbar-right">
    <button class="topbar-btn" id="add-btn" onclick="openAddModal()">✏️ Add Card</button>
    <div class="topbar-divider" id="div1" style="display:none"></div>
    <div class="topbar-info" id="topbar-info">
      <span id="username"></span>
      <span class="role-badge" id="role-badge"></span>
      <div class="topbar-divider"></div>
      <button class="topbar-btn" id="signout-btn" onclick="signOut()" style="display:none;padding:5px 12px;margin:0">Sign Out</button>
    </div>
  </div>
</div>

<div id="page">
  <div id="sidebar">
    <div>
      <div class="sidebar-section-title">Search</div>
      <input id="search" type="text" placeholder="Search cards…" oninput="applyFilters()"/>
    </div>
    <div>
      <div class="sidebar-section-title">Filters</div>
      
      <div class="filter-group">
        <div class="filter-label">Element</div>
        <select class="filter-select" id="f-element" onchange="applyFilters()">
          <option value="">All Elements</option>
          <option value="solis">Solis</option><option value="ignus">Ignus</option><option value="silva">Silva</option><option value="terra">Terra</option><option value="luna">Luna</option><option value="aqua">Aqua</option><option value="aes">Aes</option><option value="void">Void</option>
        </select>
      </div>
      
      <div class="filter-group">
        <div class="filter-label">Type</div>
        <select class="filter-select" id="f-type" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="caster">Caster</option><option value="barrier">Barrier</option><option value="conjure">Conjure</option><option value="deity">Deity</option><option value="servant">Servant</option>
        </select>
      </div>

      <div class="filter-group">
        <div class="filter-label">Rarity</div>
        <select class="filter-select" id="f-rarity" onchange="applyFilters()">
          <option value="">All Rarities</option>
          <option value="common">Common</option><option value="uncommon">Uncommon</option><option value="rare">Rare</option><option value="super rare">Super Rare</option><option value="ultra rare">Ultra Rare</option><option value="secret rare">Secret Rare</option><option value="hyper rare">Hyper Rare</option><option value="repack">Repack</option><option value="promo">Promo</option>
        </select>
      </div>

      <div class="filter-group">
        <div class="filter-label">Set / Version</div>
        <select class="filter-select" id="f-set" onchange="applyFilters()">
          <option value="">All</option>
          <option value="modern">Modern</option><option value="legacy">Legacy</option>
        </select>
      </div>

      <div class="filter-group">
        <div class="filter-label">Aether Cost</div>
        <select class="filter-multi" id="f-aether" multiple onchange="applyFilters()">
          <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
        </select>
      </div>

      <div class="filter-group">
        <div class="filter-label">Race / Trait</div>
        <select class="filter-multi" id="f-race" multiple onchange="applyFilters()">
          <option value="angel">Angel</option><option value="charm">Charm</option><option value="cosmetics">Cosmetics</option><option value="cryptid">Cryptid</option><option value="cthulhu">Cthulhu</option><option value="demon">Demon</option><option value="dragon">Dragon</option><option value="evil">Evil</option><option value="greed">Greed</option><option value="heroic spirit">Heroic Spirit</option><option value="holy">Holy</option><option value="hunger">Hunger</option><option value="insect">Insect</option><option value="jewelry">Jewelry</option><option value="justice">Justice</option><option value="madness">Madness</option><option value="monk">Monk</option><option value="plant">Plant</option><option value="pride">Pride</option><option value="rage">Rage</option><option value="research">Research</option><option value="sloth">Sloth</option><option value="solar">Solar</option><option value="supplies">Supplies</option><option value="sweets">Sweets</option><option value="youkai">Youkai</option>
        </select>
      </div>

      <div class="filter-group">
        <div class="filter-label">ATK</div>
        <div class="row-3">
          <select class="filter-select" id="f-atk-op" onchange="applyFilters()" style="padding:5px">
            <option value="">&lt;</option><option value="=">=</option><option value=">">&gt;</option>
          </select>
          <input type="number" id="f-atk-val" placeholder="0" onchange="applyFilters()" style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:5px;color:var(--white)"/>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">DEF</div>
        <div class="row-3">
          <select class="filter-select" id="f-def-op" onchange="applyFilters()" style="padding:5px">
            <option value="">&lt;</option><option value="=">=</option><option value=">">&gt;</option>
          </select>
          <input type="number" id="f-def-val" placeholder="0" onchange="applyFilters()" style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:5px;color:var(--white)"/>
        </div>
      </div>
      
      <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
      <button class="reset-btn" id="sidebar-add-btn" style="display:none;margin-top:8px;border-color:rgba(245,197,24,.3);color:#f5c518" onclick="openAddModal()">✏️ Add Card</button>
    </div>
  </div>

  <div id="main">
    <div id="controls">
      <span id="count">Loading…</span>
      <button class="sort-btn" id="refresh-btn" onclick="loadCards()">🔄 Refresh</button>
      <span style="margin-left:auto">Sort</span>
      <select class="sort-btn" id="sort-by" onchange="applyFilters()" style="padding:5px 10px;font-size:.58rem">
        <option value="name">Name</option><option value="rarity">Rarity</option>
      </select>
      <button class="sort-btn" id="sort-dir" onclick="toggleSort()" style="padding:5px 10px">↑</button>
    </div>
    <div id="grid"></div>
    <div id="empty">No cards found</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal" id="detail-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div class="detail-img" id="detail-img"></div>
    <div class="modal-title" id="detail-name"></div>
    
    <div class="detail-section">
      <div class="detail-section-label">Type</div>
      <div class="detail-text" id="detail-type"></div>
    </div>

    <div class="detail-stats">
      <div class="detail-stat"><span>ATK</span><span class="detail-stat-val" id="detail-atk"></span></div>
      <div class="detail-stat"><span>DEF</span><span class="detail-stat-val" id="detail-def"></span></div>
      <div class="detail-stat"><span>Aether</span><span class="detail-stat-val" id="detail-aether"></span></div>
      <div class="detail-stat"><span>Rarity</span><span class="detail-stat-val" id="detail-rarity"></span></div>
    </div>

    <div class="detail-section" id="detail-desc-section">
      <div class="detail-section-label">Description</div>
      <div class="detail-text" id="detail-desc"></div>
    </div>

    <div class="detail-section" id="detail-race-section">
      <div class="detail-section-label">Race / Trait</div>
      <div class="detail-text" id="detail-race"></div>
    </div>

    <button class="submit-btn" id="edit-btn" style="display:none" onclick="openEditModal()">Edit Card</button>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal" id="card-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <div class="modal-title" id="modal-title">Add Card</div>
    
    <div class="field"><label>Name *</label><input id="c-name" type="text"/></div>
    <div class="field"><label>Element</label><select id="c-element"><option value="solis">Solis</option><option value="ignus">Ignus</option><option value="silva">Silva</option><option value="terra">Terra</option><option value="luna">Luna</option><option value="aqua">Aqua</option><option value="aes">Aes</option><option value="void">Void</option></select></div>
    <div class="field"><label>Type</label><select id="c-type"><option value="caster">Caster</option><option value="barrier">Barrier</option><option value="conjure">Conjure</option><option value="deity">Deity</option><option value="servant">Servant</option></select></div>
    <div class="field"><label>Rarity</label><select id="c-rarity"><option value="common">Common</option><option value="uncommon">Uncommon</option><option value="rare">Rare</option><option value="super rare">Super Rare</option><option value="ultra rare">Ultra Rare</option><option value="secret rare">Secret Rare</option><option value="hyper rare">Hyper Rare</option><option value="repack">Repack</option><option value="promo">Promo</option></select></div>
    <div class="field"><label>Set</label><select id="c-set"><option value="modern">Modern</option><option value="legacy">Legacy</option></select></div>
    <div class="row-2">
      <div class="field"><label>ATK</label><input id="c-atk" type="number" value="0"/></div>
      <div class="field"><label>DEF</label><input id="c-def" type="number" value="0"/></div>
    </div>
    <div class="field"><label>Aether Cost</label><input id="c-aether" type="number" value="0"/></div>
    <div class="field"><label>Race / Trait</label><input id="c-race" type="text"/></div>
    <div class="field"><label>Image URL</label><input id="c-img" type="text"/></div>
    <div class="field"><label>Description</label><textarea id="c-desc"></textarea></div>
    
    <button class="submit-btn" id="save-btn" onclick="saveCard()">Save Card</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const SB_URL = 'https://bcqgrxzhjawxqwceflpk.supabase.co';
const SB_KEY = 'sb_publishable_dhuEDL-DJP4_mD4PUVIevg_1u_gjA-j';
const sb = supabase.createClient(SB_URL, SB_KEY);

const RARITY_ORDER = ['common','uncommon','rare','super rare','ultra rare','secret rare','hyper rare','repack','promo'];

const CARDS = [
  {id:1, name:"Orange Peko Lv1", element:"solis", "card type":"caster", rarity:"common", atk:100, def:50, "aether cost":2, "race_trait":"Fox Spirit", "image url":"https://cdn.buylist.ca/Single_Card_Images/watermarked/casterchronicles/the-magic-battle-begins/Orange_Peko_Lv1__The_Magic_Battle_Begins_147241_3514528.webp", description:"A fox spirit of modest power.", "card set":"modern"}
];

let allCards = [];
let user = null;
let profile = null;
let sortDir = 'asc';
let editingIdx = null;
let viewingIdx = null;

async function init() {
  const {data:{session}} = await sb.auth.getSession();
  if(session?.user) {
    user = session.user;
    const {data} = await sb.from('profiles').select('*').eq('id', session.user.id).single().catch(()=>({data:null}));
    profile = data;
  }
  updateUI();
  loadCards();
}

sb.auth.onAuthStateChange((e,s) => {
  if(e === 'SIGNED_OUT') user = profile = null;
  else if(s?.user) user = s.user;
  updateUI();
});

function updateUI() {
  const un = document.getElementById('username');
  const rb = document.getElementById('role-badge');
  const ab = document.getElementById('add-btn');
  const sab = document.getElementById('sidebar-add-btn');
  const ei = document.getElementById('edit-btn');
  const info = document.getElementById('topbar-info');
  const signout = document.getElementById('signout-btn');
  
  if(profile) {
    un.textContent = profile.username;
    rb.textContent = profile.role === 'creator' ? '👑 Creator' : '✏️ Editor';
    rb.className = `role-badge role-${profile.role}`;
    info.style.display = 'flex';
    ab.style.display = '';
    signout.style.display = '';
    if(['creator','admin','card_editor'].includes(profile.role)) {
      ei.style.display = '';
      sab.style.display = '';
    }
  } else if(user) {
    un.textContent = user.email;
    info.style.display = 'flex';
    signout.style.display = '';
  } else {
    info.style.display = 'none';
  }
}

function loadCards() {
  allCards = [...CARDS];
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const elem = document.getElementById('f-element').value;
  const typ = document.getElementById('f-type').value;
  const rar = document.getElementById('f-rarity').value;
  const set = document.getElementById('f-set').value;
  const aether = Array.from(document.getElementById('f-aether').selectedOptions).map(o => o.value);
  const races = Array.from(document.getElementById('f-race').selectedOptions).map(o => o.value);
  const atkOp = document.getElementById('f-atk-op').value;
  const atkVal = parseInt(document.getElementById('f-atk-val').value) || 0;
  const defOp = document.getElementById('f-def-op').value;
  const defVal = parseInt(document.getElementById('f-def-val').value) || 0;
  const sortBy = document.getElementById('sort-by').value;
  
  let cards = allCards.filter(c => {
    if(search && !c.name.toLowerCase().includes(search) && !(c.description||'').toLowerCase().includes(search)) return false;
    if(elem && c.element !== elem) return false;
    if(typ && c['card type'] !== typ) return false;
    if(rar && c.rarity !== rar) return false;
    if(set && c['card set'] !== set) return false;
    if(aether.length && !aether.includes(String(c['aether cost']))) return false;
    if(races.length && !races.includes(c.race_trait)) return false;
    if(atkOp === '<' && c.atk >= atkVal) return false;
    if(atkOp === '=' && c.atk !== atkVal) return false;
    if(atkOp === '>' && c.atk <= atkVal) return false;
    if(defOp === '<' && c.def >= defVal) return false;
    if(defOp === '=' && c.def !== defVal) return false;
    if(defOp === '>' && c.def <= defVal) return false;
    return true;
  });
  
  cards.sort((a,b) => {
    let va = a[sortBy], vb = b[sortBy];
    if(sortBy === 'rarity') {va = RARITY_ORDER.indexOf(va); vb = RARITY_ORDER.indexOf(vb);}
    if(typeof va === 'string') va = va.toLowerCase();
    if(typeof vb === 'string') vb = vb.toLowerCase();
    if(va < vb) return sortDir === 'asc' ? -1 : 1;
    if(va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  
  render(cards);
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('f-element').value = '';
  document.getElementById('f-type').value = '';
  document.getElementById('f-rarity').value = '';
  document.getElementById('f-set').value = '';
  document.getElementById('f-aether').selectedIndex = -1;
  document.getElementById('f-race').selectedIndex = -1;
  document.getElementById('f-atk-op').value = '';
  document.getElementById('f-atk-val').value = '';
  document.getElementById('f-def-op').value = '';
  document.getElementById('f-def-val').value = '';
  applyFilters();
}

function toggleSort() {
  sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  document.getElementById('sort-dir').textContent = sortDir === 'asc' ? '↑' : '↓';
  applyFilters();
}

function render(cards) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');
  
  count.textContent = cards.length + ' card' + (cards.length !== 1 ? 's' : '') + ' found';
  
  if(!cards.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  
  empty.style.display = 'none';
  grid.innerHTML = cards.map(c => `
    <div class="card" onclick="openDetailModal(${allCards.indexOf(c)})">
      <div class="card-img"><img src="${c['image url']}" alt="${c.name}"/></div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">${c.element} • ${c['card type']}</div>
        <div class="card-rarity">${c.rarity}</div>
        ${(profile && ['creator','admin','card_editor'].includes(profile.role)) ? `<button class="edit-card-btn" onclick="event.stopPropagation(); openDetailModal(${allCards.indexOf(c)}); setTimeout(()=>openEditModal(), 300)">✏️ Edit</button>` : ''}
      </div>
    </div>
  `).join('');
}

function openDetailModal(idx) {
  viewingIdx = idx;
  const c = allCards[idx];
  document.getElementById('detail-img').innerHTML = `<img src="${c['image url']}" alt="${c.name}"/>`;
  document.getElementById('detail-name').textContent = c.name;
  document.getElementById('detail-type').textContent = `${c.element} • ${c['card type']}`;
  document.getElementById('detail-atk').textContent = c.atk;
  document.getElementById('detail-def').textContent = c.def;
  document.getElementById('detail-aether').textContent = c['aether cost'];
  document.getElementById('detail-rarity').textContent = c.rarity;
  document.getElementById('detail-desc').textContent = c.description || '—';
  document.getElementById('detail-desc-section').style.display = c.description ? '' : 'none';
  document.getElementById('detail-race').textContent = c.race_trait || '—';
  document.getElementById('detail-race-section').style.display = c.race_trait ? '' : 'none';
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

function openAddModal() {
  editingIdx = null;
  document.getElementById('modal-title').textContent = 'Add Card';
  document.getElementById('c-name').value = '';
  document.getElementById('c-desc').value = '';
  document.getElementById('c-race').value = '';
  document.getElementById('msg').textContent = '';
  document.getElementById('card-modal').classList.add('open');
}

function openEditModal() {
  if(viewingIdx === null) return;
  closeDetailModal();
  editingIdx = viewingIdx;
  const c = allCards[editingIdx];
  document.getElementById('modal-title').textContent = 'Edit Card';
  document.getElementById('c-name').value = c.name;
  document.getElementById('c-element').value = c.element;
  document.getElementById('c-type').value = c['card type'];
  document.getElementById('c-rarity').value = c.rarity;
  document.getElementById('c-set').value = c['card set'];
  document.getElementById('c-atk').value = c.atk;
  document.getElementById('c-def').value = c.def;
  document.getElementById('c-aether').value = c['aether cost'];
  document.getElementById('c-race').value = c.race_trait;
  document.getElementById('c-img').value = c['image url'];
  document.getElementById('c-desc').value = c.description;
  document.getElementById('msg').textContent = '';
  document.getElementById('card-modal').classList.add('open');
}

function closeAddModal() {
  document.getElementById('card-modal').classList.remove('open');
}

function saveCard() {
  const name = document.getElementById('c-name').value.trim();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('save-btn');
  
  if(!name) {
    msg.textContent = 'Name required';
    msg.className = 'msg err';
    return;
  }
  
  const card = {
    id: editingIdx === null ? Math.max(...allCards.map(c => c.id || 0), 0) + 1 : allCards[editingIdx].id,
    name,
    element: document.getElementById('c-element').value,
    'card type': document.getElementById('c-type').value,
    rarity: document.getElementById('c-rarity').value,
    'card set': document.getElementById('c-set').value,
    atk: parseInt(document.getElementById('c-atk').value) || 0,
    def: parseInt(document.getElementById('c-def').value) || 0,
    'aether cost': parseInt(document.getElementById('c-aether').value) || 0,
    race_trait: document.getElementById('c-race').value,
    'image url': document.getElementById('c-img').value,
    description: document.getElementById('c-desc').value
  };
  
  btn.disabled = true;
  msg.textContent = 'Saving…';
  msg.className = 'msg';
  
  setTimeout(() => {
    if(editingIdx === null) {
      allCards.push(card);
    } else {
      allCards[editingIdx] = card;
    }
    
    msg.textContent = editingIdx === null ? '✓ Card added!' : '✓ Card updated!';
    msg.className = 'msg ok';
    btn.disabled = false;
    
    setTimeout(() => {
      closeAddModal();
      applyFilters();
    }, 1000);
  }, 300);
}

async function saveCardToGitHub() {
  try {
    const content = JSON.stringify(allCards, null, 2);
    const blob = new Blob([content], {type: 'application/json'});
    const text = await blob.text();
    const encoded = btoa(unescape(encodeURIComponent(text)));
    
    const response = await fetch('https://api.github.com/repos/equinify/random-game/contents/cardimage.json', {
      method: 'PUT',
      headers: {
        'Authorization': `token ${user ? 'ghp_YOUR_TOKEN_HERE' : ''}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Updated cards by ${profile?.username || 'unknown'}`,
        content: encoded,
        branch: 'main'
      })
    });
    
    if(!response.ok) {
      console.error('Failed to save to GitHub:', response.statusText);
      return false;
    }
    return true;
  } catch(e) {
    console.error('GitHub save error:', e);
    return false;
  }
}
  await sb.auth.signOut();
  user = profile = null;
  updateUI();
}

init();
</script>
