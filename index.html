<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caster Chronicles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --white:   #f5f5f5;
      --grey:    #888;
      --grey-dim:#333;
      --border:  rgba(255,255,255,0.12);
      --panel:   rgba(255,255,255,0.04);
      --green:   #4caf50;
      --red:     #e53935;
      --creator-color:  #f5c518;
      --admin-color:    #e53935;
      --editor-color:   #90caf9;
      --mod-color:      #80cbc4;
      --supporter-color:#b0bec5;
      --player-color:   #555;
    }

    html, body { height:100%; background:var(--black); color:var(--white); font-family:'Crimson Pro',serif; overflow:hidden; }

    #app { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; z-index:10; }

    #header { text-align:center; margin-bottom:8px; animation:fadeDown 1s ease both; }
    .logo-eyebrow { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.48em; text-transform:uppercase; color:var(--grey); margin-bottom:10px; }
    .logo-title { font-family:'Cinzel Decorative',serif; font-size:clamp(2rem,5vw,3.8rem); font-weight:900; line-height:1; color:var(--white); }
    .logo-sub { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.5em; color:var(--grey); margin-top:10px; text-transform:uppercase; }

    #stats-bar { display:flex; align-items:stretch; margin:16px auto 0; border:1px solid var(--border); border-radius:2px; background:var(--panel); overflow:hidden; animation:fadeIn 1.4s ease both .4s; width:fit-content; }
    .stat-item { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 28px; gap:3px; }
    .stat-item+.stat-item { border-left:1px solid var(--border); }
    .stat-value { font-family:'Cinzel Decorative',serif; font-size:1.2rem; color:var(--white); line-height:1; }
    .stat-value.pulse { animation:statPulse .4s ease; }
    @keyframes statPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2);color:#fff} }
    .stat-label { font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.22em; text-transform:uppercase; color:var(--grey); }

    .divider { display:flex; align-items:center; gap:12px; width:320px; margin:18px auto; animation:fadeIn 1.2s ease both .3s; }
    .divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--grey-dim),transparent); }
    .divider-gem { width:5px; height:5px; background:var(--grey); transform:rotate(45deg); }

    #nav { display:flex; flex-direction:column; gap:6px; width:310px; animation:fadeUp 1s ease both .25s; }
    .nav-btn { position:relative; display:flex; align-items:center; gap:14px; padding:12px 18px; background:var(--panel); border:1px solid var(--border); border-radius:2px; cursor:pointer; color:inherit; transition:border-color .2s,background .2s,transform .15s; overflow:hidden; outline:none; text-decoration:none; }
    .nav-btn:hover { border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.07); transform:translateX(3px); }
    .nav-btn:active { transform:translateX(1px) scale(.99); }
    .btn-icon { font-size:1.1rem; width:22px; text-align:center; flex-shrink:0; opacity:.7; transition:opacity .2s; }
    .nav-btn:hover .btn-icon { opacity:1; }
    .btn-text { display:flex; flex-direction:column; }
    .btn-label { font-family:'Cinzel',serif; font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--white); }
    .btn-desc { font-size:.68rem; color:var(--grey); margin-top:2px; }
    .btn-arrow { margin-left:auto; color:var(--grey-dim); font-size:.85rem; opacity:0; transition:opacity .2s,transform .2s; }
    .nav-btn:hover .btn-arrow { opacity:1; transform:translateX(3px); }
    .nav-btn.primary { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.07); }
    .nav-btn.primary .btn-label { color:var(--white); }

    #auth-bar { position:fixed; top:16px; left:20px; z-index:20; display:flex; align-items:center; gap:8px; }
    .auth-btn { font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.16em; text-transform:uppercase; color:var(--grey); background:transparent; border:1px solid var(--border); padding:5px 13px; border-radius:2px; cursor:pointer; transition:color .2s,border-color .2s; }
    .auth-btn:hover { color:var(--white); border-color:rgba(255,255,255,.3); }
    .auth-sep { color:var(--grey-dim); }
    #version { position:fixed; top:16px; right:20px; font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.2em; color:var(--grey-dim); border:1px solid var(--border); padding:4px 10px; border-radius:2px; }

    #user-pill { display:none; align-items:center; gap:8px; border:1px solid var(--border); border-radius:2px; padding:5px 13px; background:var(--panel); }
    #user-pill.visible { display:flex; }
    .user-name { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.12em; color:var(--white); }
    .role-badge { font-size:.55rem; font-family:'Cinzel',serif; letter-spacing:.08em; padding:2px 7px; border-radius:2px; font-weight:700; text-transform:uppercase; border:1px solid; }
    .role-creator    { color:var(--creator-color);   border-color:rgba(245,197,24,.3);  background:rgba(245,197,24,.08); }
    .role-admin      { color:var(--admin-color);     border-color:rgba(229,57,53,.3);   background:rgba(229,57,53,.08); }
    .role-card_editor{ color:var(--editor-color);    border-color:rgba(144,202,249,.3); background:rgba(144,202,249,.08); }
    .role-moderator  { color:var(--mod-color);       border-color:rgba(128,203,196,.3); background:rgba(128,203,196,.08); }
    .role-supporter  { color:var(--supporter-color); border-color:rgba(176,190,197,.3); background:rgba(176,190,197,.08); }
    .role-player     { color:var(--grey);            border-color:rgba(100,100,100,.3); background:rgba(100,100,100,.08); }
    .sign-out-btn { background:none; border:none; cursor:pointer; color:var(--grey-dim); font-size:.75rem; transition:color .2s; }
    .sign-out-btn:hover { color:var(--red); }

    .modal-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.85); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-box { background:#111; border:1px solid var(--border); border-radius:3px; padding:34px 38px; width:370px; position:relative; transform:translateY(16px) scale(.97); transition:transform .25s ease; max-height:90vh; overflow-y:auto; }
    .modal-overlay.open .modal-box { transform:translateY(0) scale(1); }
    .modal-title { font-family:'Cinzel Decorative',serif; font-size:1rem; color:var(--white); margin-bottom:5px; }
    .modal-sub { font-size:.74rem; color:var(--grey-dim); margin-bottom:20px; }
    .modal-close { position:absolute; top:14px; right:16px; background:none; border:none; cursor:pointer; color:var(--grey-dim); font-size:1rem; transition:color .2s; }
    .modal-close:hover { color:var(--white); }
    .field { margin-bottom:12px; }
    .field label { display:block; font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.18em; text-transform:uppercase; color:var(--grey); margin-bottom:5px; }
    .field input,.field select,.field textarea { width:100%; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:2px; padding:9px 12px; color:var(--white); font-family:'Crimson Pro',serif; font-size:.92rem; outline:none; transition:border-color .2s; }
    .field select option { background:#111; }
    .field textarea { resize:vertical; min-height:75px; }
    .field input:focus,.field select:focus,.field textarea:focus { border-color:rgba(255,255,255,.35); }
    .modal-btn { width:100%; margin-top:6px; padding:11px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2); border-radius:2px; color:var(--white); font-family:'Cinzel',serif; font-size:.67rem; letter-spacing:.22em; text-transform:uppercase; cursor:pointer; transition:background .2s,border-color .2s; }
    .modal-btn:hover { background:rgba(255,255,255,.13); border-color:rgba(255,255,255,.4); }
    .modal-btn:disabled { opacity:.35; cursor:not-allowed; }
    .modal-switch { text-align:center; margin-top:14px; font-size:.72rem; color:var(--grey-dim); }
    .modal-switch a { color:var(--grey); cursor:pointer; text-decoration:underline; }
    .modal-switch a:hover { color:var(--white); }
    .modal-err { margin-top:8px; font-size:.72rem; color:var(--red); text-align:center; min-height:16px; }
    .modal-ok  { margin-top:8px; font-size:.72rem; color:var(--green); text-align:center; min-height:16px; }

    .user-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border-bottom:1px solid var(--border); }
    .user-row:last-child { border-bottom:none; }
    .user-row-name { font-family:'Cinzel',serif; font-size:.65rem; color:var(--white); flex:1; }
    .user-row select { background:#111; border:1px solid var(--border); border-radius:2px; padding:4px 8px; color:var(--white);
